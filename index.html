<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Magic!</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Chewy&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #f3f6f9;
  --bg2: #ffffff;
  --bg3: #f8fafc;
  --bg4: #e2e8f0;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --txt: #1e293b;
  --txt2: #475569;
  --txt3: #94a3b8;
  --bdr: rgba(0,0,0,0.08);
  --bdr2: rgba(0,0,0,0.12);
  --add: #f43f5e;
  --sub: #0ea5e9;
  --mul: #8b5cf6;
  --r: 24px; 
  --sh: 0 12px 40px rgba(0,0,0,0.06);
  --num-font: 'Share Tech Mono', monospace;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { min-height:100vh; font-family:'Outfit', sans-serif; background:var(--bg1); color:var(--txt); overflow-x:hidden; }

/* ── LAYOUT ── */
#app { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:30px 16px 70px; }

.game-title {
  font-family:'Chewy', cursive; font-size:clamp(2.5rem,8vw,4rem);
  background:linear-gradient(135deg, var(--accent) 0%, #f43f5e 40%, #8b5cf6 80%, #0ea5e9 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  text-align:center; margin-bottom:4px; letter-spacing:1px; text-shadow: 0 4px 12px rgba(0,0,0,0.05);
}
.game-sub { color:var(--txt2); text-align:center; font-size:1.05rem; font-weight:600; margin-bottom:30px; letter-spacing:0.5px; }

/* ── CARDS ── */
.setup-card, .game-card, .results-card {
  background:var(--bg2); border:1px solid var(--bdr);
  border-radius:var(--r); box-shadow:var(--sh);
  animation:popIn .5s cubic-bezier(0.16, 1, 0.3, 1);
  width:100%; max-width:560px; position: relative;
}
.setup-card  { padding:30px 24px; }
.game-card   { padding:24px 20px 28px; }
.results-card{ padding:36px 24px 30px; text-align:center; }
@keyframes popIn { from{transform:scale(0.9) translateY(20px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }

.sec-label {
  font-weight: 700; font-size:0.9rem; color:var(--txt3);
  letter-spacing:1.5px; text-transform:uppercase; margin-bottom:12px; margin-top:24px;
}
.sec-label:first-child { margin-top:0; }

/* ── DIGIT PICKER ── */
.digit-row { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.digit-btn {
  background:var(--bg3); border:2px solid var(--bdr); border-radius:14px;
  padding:12px 4px; cursor:pointer; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:6px; transition:all .2s ease;
}
.digit-btn .d-dots { display:flex; flex-wrap:wrap; justify-content:center; gap:4px; width:30px; min-height:22px; align-items:center; }
.digit-btn .d-dot  { width:6px; height:6px; border-radius:50%; background:var(--bdr2); transition:background .2s; }
.digit-btn .d-label{ font-weight:700; font-size:.75rem; color:var(--txt3); transition:color .2s; line-height:1; }
.digit-btn .d-range{ font-size:.6rem; color:var(--txt3); transition:color .2s; font-weight:600;}
.digit-btn:hover:not(.sel-as) { border-color:var(--bdr2); background:var(--bg4); transform:translateY(-2px); }
.digit-btn.sel-as {
  border-color:var(--accent); background:rgba(99,102,241,0.08);
  box-shadow:0 4px 12px rgba(99,102,241,0.15);
}
.digit-btn.sel-as .d-dot  { background:var(--accent); }
.digit-btn.sel-as .d-label{ color:var(--accent); }
.digit-btn.sel-as .d-range{ color:var(--accent); opacity:0.8; }

/* ── MUL DROPDOWNS ── */
.mul-row   { display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:center; }
.mul-arrow { color:var(--txt3); font-weight:700; font-size:1rem; text-align:center; }
.mul-hint  { font-size:.7rem; color:var(--txt3); margin-top:8px; text-align:right; font-weight:600;}
.styled-sel {
  background:var(--bg3); border:2px solid rgba(139,92,246,0.3); border-radius:12px;
  color:var(--txt); font-family:'Outfit',sans-serif; font-size:1rem; font-weight:700;
  padding:10px 14px; cursor:pointer; appearance:none; -webkit-appearance:none;
  outline:none; width:100%; transition:all .2s;
}
.styled-sel:focus { border-color:var(--mul); background-color:var(--bg2); box-shadow:0 0 0 3px rgba(139,92,246,0.15); }
.styled-sel option { background:var(--bg2); }
.styled-sel:disabled { opacity:.4; cursor:not-allowed; }

/* ── OP BUTTONS ── */
.op-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.op-btn {
  border-radius:18px; padding:0; cursor:pointer; text-align:center;
  transition:all .2s cubic-bezier(0.16, 1, 0.3, 1); border:2px solid var(--bdr); background:var(--bg3); overflow:hidden; position:relative;
}
.op-btn-inner { padding:16px 8px 14px; display:flex; flex-direction:column; align-items:center; gap:8px; }
.op-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-family:'Chewy',cursive; font-size:2rem; transition:transform .2s; background:var(--bg4); color:var(--txt2); }
.op-label { font-weight:700; font-size:.9rem; color:var(--txt2); transition:color .2s; }
.op-btn:hover:not(.selected) { border-color:var(--bdr2); transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.04); }
.op-btn:hover .op-icon { transform:scale(1.08); }
.op-btn.op-add.selected { border-color:var(--add); background:rgba(244,63,94,0.04); box-shadow:0 8px 24px rgba(244,63,94,0.12); }
.op-btn.op-sub.selected { border-color:var(--sub); background:rgba(14,165,233,0.04); box-shadow:0 8px 24px rgba(14,165,233,0.12); }
.op-btn.op-mul.selected { border-color:var(--mul); background:rgba(139,92,246,0.04); box-shadow:0 8px 24px rgba(139,92,246,0.12); }
.op-btn.op-add.selected .op-icon { background:var(--add); color:#fff; }
.op-btn.op-sub.selected .op-icon { background:var(--sub); color:#fff; }
.op-btn.op-mul.selected .op-icon { background:var(--mul); color:#fff; }
.op-btn.selected .op-label { color:var(--txt); }
.op-btn .op-check { position:absolute; top:8px; right:10px; font-size:1rem; opacity:0; transition:opacity .2s; color:var(--txt); }
.op-btn.selected .op-check { opacity:1; }

/* ── Q COUNT ── */
.qcount-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.qcount-btn {
  border:2px solid var(--bdr); border-radius:12px; padding:12px;
  cursor:pointer; text-align:center; font-weight:700; font-size:1.1rem;
  color:var(--txt2); background:var(--bg3); transition:all .2s;
}
.qcount-btn.selected { border-color:var(--accent); background:rgba(99,102,241,0.08); color:var(--accent); box-shadow:0 4px 12px rgba(99,102,241,0.15); }
.qcount-btn:hover:not(.selected) { border-color:var(--bdr2); transform:translateY(-2px); }

/* ── START BTN ── */
.start-btn {
  width:100%; margin-top:28px; padding:16px; border:none; border-radius:16px;
  font-weight:800; font-size:1.2rem; letter-spacing:1px; cursor:pointer; text-transform:uppercase;
  background:var(--accent); color:#fff;
  box-shadow:0 8px 20px rgba(99,102,241,0.3); transition:all .2s cubic-bezier(0.16, 1, 0.3, 1);
}
.start-btn:hover  { transform:translateY(-2px); box-shadow:0 12px 24px rgba(99,102,241,0.4); background:var(--accent-hover); }
.start-btn:active { transform:translateY(2px);  box-shadow:0 4px 10px rgba(99,102,241,0.3); }
.start-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

/* ── HUD ── */
.game-header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; }
.icon-btn { 
  background: var(--bg3); border: 1px solid var(--bdr); border-radius: 12px; 
  padding: 8px 14px; font-weight: 700; font-size: 0.9rem; color: var(--txt2);
  cursor: pointer; transition: all .2s; display:flex; align-items:center; gap:6px;
}
.icon-btn:hover { background: var(--bg4); color: var(--txt); transform:translateY(-1px); box-shadow:0 4px 10px rgba(0,0,0,0.05); }
.icon-btn:active { transform:translateY(1px); }

.hud { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.hud-stat { display:flex; flex-direction:column; align-items:center; }
.hud-val   { font-size:1.3rem; color:var(--txt); font-weight:800; line-height:1; }
.hud-label { font-size:.65rem; color:var(--txt3); letter-spacing:1px; text-transform:uppercase; font-weight:700; margin-top:4px;}
.hud-op-badge {
  font-weight:800; font-size:1rem; letter-spacing:0.5px;
  padding:6px 16px 6px 8px; border-radius:50px; display:flex; align-items:center; gap:8px;
  color:var(--txt); border:2px solid transparent; background:var(--bg3);
}
.hud-op-badge .badge-sym { font-family:'Share Tech Mono',monospace; font-size:1.2rem; line-height:1; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;}
.hud-op-badge.add { border-color:rgba(244,63,94,0.2); }
.hud-op-badge.add .badge-sym { background:var(--add); }
.hud-op-badge.sub { border-color:rgba(14,165,233,0.2); }
.hud-op-badge.sub .badge-sym { background:var(--sub); }
.hud-op-badge.mul { border-color:rgba(139,92,246,0.2); }
.hud-op-badge.mul .badge-sym { background:var(--mul); }

/* ── PROGRESS ── */
.progress-track { background:var(--bg4); border-radius:20px; height:8px; margin-bottom:24px; overflow:hidden; }
.progress-fill  { height:100%; border-radius:20px; transition:width .5s cubic-bezier(0.16, 1, 0.3, 1); }
.progress-fill.add { background:linear-gradient(90deg,#fb7185,var(--add)); }
.progress-fill.sub { background:linear-gradient(90deg,#38bdf8,var(--sub)); }
.progress-fill.mul { background:linear-gradient(90deg,#a78bfa,var(--mul)); }

/* ── QUESTION BOX ── */
.question-box {
  border-radius:24px; padding:24px; margin-bottom:20px;
  border:2px solid transparent; background:var(--bg3);
  display:flex; flex-direction:column; align-items:center;
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
}
.question-box.add { border-color:rgba(244,63,94,0.15); background:rgba(244,63,94,0.02); }
.question-box.sub { border-color:rgba(14,165,233,0.15); background:rgba(14,165,233,0.02); }
.question-box.mul { border-color:rgba(139,92,246,0.15); background:rgba(139,92,246,0.02); }
.q-emoji { font-size:2rem; margin-bottom:12px; display:block; animation:floatY 3s ease-in-out infinite alternate; }
@keyframes floatY { from{transform:translateY(0)} to{transform:translateY(-8px)} }

/* ── COLUMN ARITHMETIC ── */
.q-column {
  display:inline-grid;
  grid-template-columns:auto auto;
  align-items:baseline;
  row-gap:4px;
}
.q-col-sym {
  font-family:var(--num-font);
  font-size:clamp(1.8rem,5.5vw,2.5rem);
  line-height:1.1;
  padding-right:12px;
  text-align:right;
}
.q-col-sym.add { color:var(--add); }
.q-col-sym.sub { color:var(--sub); }
.q-col-sym.mul { color:var(--mul); }
.q-col-sym.spacer { visibility:hidden; }
.q-col-num {
  font-family:var(--num-font);
  font-size:clamp(2.5rem,8vw,3.5rem);
  color:var(--txt); line-height:1;
  text-align:right;
  min-width:4.5ch;
  display:block;
}
.q-divider {
  grid-column:1/-1;
  height:4px; border-radius:2px; margin:8px 0;
}
.q-divider.add { background:var(--add); opacity:0.3; }
.q-divider.sub { background:var(--sub); opacity:0.3; }
.q-divider.mul { background:var(--mul); opacity:0.3; }
.q-blank {
  font-family:var(--num-font);
  font-size:clamp(2.5rem,8vw,3.5rem);
  color:var(--txt3);
  text-align:right;
  min-width:4.5ch;
  display:block;
  border-bottom:4px dashed var(--bdr2);
  padding-bottom:4px;
}
.q-hint { font-size:.8rem; color:var(--txt3); margin-top:16px; font-weight:600; text-align:center; }

/* ── ANSWER INPUT ── */
.answer-row { display:flex; gap:12px; align-items:center; margin-bottom:16px; }
.ans-input {
  flex:1; min-width:0; background:var(--bg3); border:2px solid var(--bdr2);
  border-radius:16px; color:var(--txt); font-family:var(--num-font);
  font-size:clamp(1.8rem,6vw,2.2rem); padding:12px 16px;
  outline:none; text-align:center; transition:all .2s;
  -moz-appearance:textfield; box-shadow:inset 0 2px 6px rgba(0,0,0,0.02);
}
.ans-input::-webkit-outer-spin-button,.ans-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.ans-input:focus   { border-color:var(--accent); background:var(--bg2); box-shadow:0 0 0 4px rgba(99,102,241,0.15); }
.ans-input.correct { border-color:#22c55e; background:rgba(34,197,94,0.05); animation:cBounce .5s ease; box-shadow:0 0 0 4px rgba(34,197,94,0.15); color:#16a34a; }
.ans-input.wrong   { border-color:#ef4444; background:rgba(239,68,68,0.05); animation:wShake .45s ease; box-shadow:0 0 0 4px rgba(239,68,68,0.15); color:#dc2626; }
.check-btn {
  padding:14px 24px; border:none; border-radius:16px; font-weight:800;
  font-size:1.1rem; cursor:pointer; text-transform:uppercase; letter-spacing:1px;
  background:var(--accent); color:#fff;
  box-shadow:0 6px 16px rgba(99,102,241,0.25); transition:all .2s;
  white-space:nowrap;
}
.check-btn:hover   { transform:translateY(-2px); box-shadow:0 10px 20px rgba(99,102,241,0.35); background:var(--accent-hover); }
.check-btn:active  { transform:translateY(2px);  box-shadow:0 2px 8px rgba(99,102,241,0.25); }
.check-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }

@keyframes cBounce { 0%{transform:scale(1)}35%{transform:scale(1.04)}65%{transform:scale(.98)}100%{transform:scale(1)} }
@keyframes wShake  { 0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)} }

/* ── FEEDBACK & NEXT ── */
.feedback-bar { min-height:2rem; text-align:center; font-weight:700; font-size:1.1rem; margin-bottom:12px; animation:fadeUp .3s ease; color:var(--txt); }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.feedback-bar.good { color:#16a34a; }
.feedback-bar.bad  { color:#dc2626; }
.next-btn {
  width:100%; padding:14px; border:none; border-radius:16px;
  font-weight:800; font-size:1.1rem; letter-spacing:1px; cursor:pointer; text-transform:uppercase;
  transition:all .2s; display:none;
  background:#22c55e; color:#fff; box-shadow:0 6px 16px rgba(34,197,94,0.25);
}
.next-btn.show   { display:block; animation:popIn .3s ease; }
.next-btn:hover  { transform:translateY(-2px); box-shadow:0 10px 20px rgba(34,197,94,0.35); }
.next-btn:active { transform:translateY(2px);  box-shadow:0 2px 8px rgba(34,197,94,0.25); }

/* ── RESULTS ── */
.results-medal  { font-size:5rem; display:block; margin-bottom:12px; animation:mBounce 1s ease-in-out infinite alternate; filter:drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
@keyframes mBounce { from{transform:translateY(0) scale(1)} to{transform:translateY(-15px) scale(1.05)} }
.results-title  { font-weight:800; font-size:2rem; color:var(--txt); margin-bottom:8px; }
.results-score  { font-family:var(--num-font); font-size:4.5rem; background:linear-gradient(135deg, var(--accent), #f43f5e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; }
.results-denom  { font-size:1rem; color:var(--txt3); margin-bottom:16px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
.results-stars  { font-size:2.5rem; letter-spacing:6px; margin-bottom:12px; }
.results-msg    { color:var(--txt2); font-size:1.1rem; font-weight:600; margin-bottom:28px; line-height:1.5; }
.results-breakdown { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:28px; }
.breakdown-pill { border-radius:16px; padding:12px 8px; text-align:center; font-weight:700; border:1px solid var(--bdr); background:var(--bg3); }
.breakdown-pill .bp-num   { font-size:1.4rem; display:block; margin-bottom:4px; font-family:var(--num-font); }
.breakdown-pill .bp-label { font-size:.65rem; text-transform:uppercase; letter-spacing:1px; color:var(--txt3); }
.breakdown-pill.add-pill { border-color:rgba(244,63,94,0.2); }
.breakdown-pill.add-pill .bp-num { color:var(--add); }
.breakdown-pill.sub-pill { border-color:rgba(14,165,233,0.2); }
.breakdown-pill.sub-pill .bp-num { color:var(--sub); }
.breakdown-pill.mul-pill { border-color:rgba(139,92,246,0.2); }
.breakdown-pill.mul-pill .bp-num { color:var(--mul); }
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.retry-btn,.menu-btn { padding:14px; border:none; border-radius:16px; font-weight:800; font-size:1.1rem; cursor:pointer; transition:all .2s; text-transform:uppercase; letter-spacing:1px; }
.retry-btn { background:var(--accent); color:white; box-shadow:0 6px 16px rgba(99,102,241,0.25); }
.retry-btn:hover  { transform:translateY(-2px); box-shadow:0 10px 20px rgba(99,102,241,0.35); background:var(--accent-hover); }
.retry-btn:active { transform:translateY(2px); box-shadow:0 2px 8px rgba(99,102,241,0.25); }
.menu-btn { background:var(--bg3); color:var(--txt2); border:2px solid var(--bdr); }
.menu-btn:hover { background:var(--bg4); transform:translateY(-2px); color:var(--txt); }

/* ── CONFETTI ── */
.confetti-piece { position:fixed; width:10px; height:15px; border-radius:4px; opacity:0; pointer-events:none; z-index:99; animation:cfFall linear forwards; }
@keyframes cfFall { 0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(900deg)} }

/* ── RESPONSIVE ── */
@media(max-width:480px){
  #app { padding:20px 12px 50px; }
  .game-title { font-size:clamp(2rem,8vw,2.8rem); }
  .setup-card,.game-card,.results-card { border-radius:20px; }
  .setup-card { padding:20px 16px; }
  .game-card  { padding:20px 16px; }
  .digit-btn  { padding:8px 2px; }
  .op-icon  { width:44px; height:44px; font-size:1.6rem; }
  .qcount-btn { padding:10px; }
  .game-header { margin-bottom:12px; }
  .hud-val { font-size: 1.1rem; }
  .hud-op-badge { font-size: 0.85rem; padding: 4px 12px 4px 6px; }
  .hud-op-badge .badge-sym { width:24px; height:24px; font-size:1rem; }
  .q-col-num, .q-blank { font-size:clamp(2rem,8vw,2.8rem); }
  .q-col-sym { font-size:clamp(1.5rem,6vw,2rem); }
  .answer-row { flex-direction:column; }
  .ans-input, .check-btn { width:100%; }
  .btn-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div id="app">
  <div class="game-title">✨ Math Magic!</div>
  <div class="game-sub">🚀 The Adventure Math Game</div>
  <div id="screen"></div>
</div>
<script>
var DIGIT_CONFIG=[
  {d:1,lo:1,    hi:9,    label:"1-Digit",range:"1-9"},
  {d:2,lo:10,   hi:99,   label:"2-Digit",range:"10-99"},
  {d:3,lo:100,  hi:999,  label:"3-Digit",range:"100-999"},
  {d:4,lo:1000, hi:9999, label:"4-Digit",range:"1K-9K"},
  {d:5,lo:10000,hi:99999,label:"5-Digit",range:"10K-99K"}
];

var state={
  screen:"setup",
  asDigits:[1],mulFrom:1,mulTo:12,
  ops:[],qCount:10,
  questions:[],cur:0,score:0,answered:false,
  bd:{add:{c:0,t:0},sub:{c:0,t:0},mul:{c:0,t:0}}
};

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){return a.slice().sort(function(){return Math.random()-.5;});}
function hasOp(op){return state.ops.indexOf(op)>=0;}
function toggleOp(op){var i=state.ops.indexOf(op);if(i>=0)state.ops.splice(i,1);else state.ops.push(op);}
function hasDigit(d){return state.asDigits.indexOf(d)>=0;}
function toggleDigit(d){var i=state.asDigits.indexOf(d);if(i>=0)state.asDigits.splice(i,1);else state.asDigits.push(d);}

function randFromDigits(){
  var pool=state.asDigits;
  var d=pool[ri(0,pool.length-1)];
  var cfg=null;
  for(var i=0;i<DIGIT_CONFIG.length;i++){if(DIGIT_CONFIG[i].d===d){cfg=DIGIT_CONFIG[i];break;}}
  return ri(cfg.lo,cfg.hi);
}

var HINTS={
  add:["Combine them together!","Add them all up!","Count them all!"],
  sub:["Take some away!","How many are left?","Remove and count!"],
  mul:["Equal groups!","Repeated adding!","Count in groups!"]
};
var EMOJIS={
  add:["🍎","🎈","⭐","🌸","🦋","🍕","🐶","🌈","🎁","🦄"],
  sub:["🍊","🎀","🌙","🐟","🍦","🎠","🐱","🌹","🚂","🦊"],
  mul:["🌟","🎸","🐬","🦀","🏀","🍄","🎢","🦁","🌊","🎯"]
};

function genQ(op){
  var a,b,answer;
  if(op==="add"){a=randFromDigits();b=randFromDigits();answer=a+b;}
  else if(op==="sub"){a=randFromDigits();b=randFromDigits();if(b>a){var t=a;a=b;b=t;}answer=a-b;}
  else{a=ri(state.mulFrom,state.mulTo);b=ri(state.mulFrom,state.mulTo);answer=a*b;}
  var em=EMOJIS[op];
  var sym=(op==="add")?"+":((op==="sub")?"−":"×");
  return{op:op,a:a,b:b,answer:answer,sym:sym,
    hint:HINTS[op][ri(0,HINTS[op].length-1)],
    emoji:em[ri(0,em.length-1)]};
}

function generateQuestions(){
  var ops=state.ops;
  var perOp=Math.ceil(state.qCount/ops.length);
  var qs=[];
  for(var i=0;i<ops.length;i++){
    var op=ops[i];state.bd[op].t=perOp;
    for(var j=0;j<perOp;j++)qs.push(genQ(op));
  }
  return shuffle(qs).slice(0,state.qCount);
}

function starsEmoji(s,t){var p=s/t;return p===1?"⭐⭐⭐":p>=0.7?"⭐⭐":"⭐";}
function medalFor(s,t){var p=s/t;return p===1?"🏆":p>=0.7?"🥈":p>=0.4?"🥉":"🎗️";}
function msgFor(s,t){
  var p=s/t;
  if(p===1)return"Perfect! You're a Math Wizard! 🧙";
  if(p>=0.8)return"Outstanding work, Superstar! 🌟";
  if(p>=0.6)return"Great effort! Keep it up! 💪";
  if(p>=0.4)return"Good try! Practice makes perfect! 📚";
  return"Don't give up! Every try makes you stronger! 🌈";
}

function confetti(count){
  var cols=["#f43f5e","#0ea5e9","#8b5cf6","#22c55e","#f59e0b"];
  for(var i=0;i<count;i++){
    var el=document.createElement("div");el.className="confetti-piece";
    el.style.left=ri(5,95)+"vw";
    el.style.background=cols[ri(0,cols.length-1)];
    el.style.animationDuration=(1.8+Math.random()*2.2)+"s";
    el.style.animationDelay=(Math.random()*1.6)+"s";
    document.body.appendChild(el);
    (function(e){setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e);},5000);})(el);
  }
}

function render(){
  var sc=document.getElementById("screen");
  if(state.screen==="setup")renderSetup(sc);
  else if(state.screen==="game")renderGame(sc);
  else renderResults(sc);
}

/* ── SETUP ── */
function renderSetup(el){
  var canStart=state.ops.length>0&&((hasOp("add")||hasOp("sub"))?state.asDigits.length>0:true);
  var hasMul=hasOp("mul");
  var digitBtns="";
  for(var i=0;i<DIGIT_CONFIG.length;i++){
    var cfg=DIGIT_CONFIG[i];
    var dots="";for(var k=0;k<cfg.d;k++)dots+='<span class="d-dot"></span>';
    var sel=hasDigit(cfg.d)?' sel-as':'';
    digitBtns+='<div class="digit-btn'+sel+'" data-d="'+cfg.d+'"><div class="d-dots">'+dots+'</div>'
      +'<span class="d-label">'+cfg.label+'</span><span class="d-range">'+cfg.range+'</span></div>';
  }
  var fromOpts="",toOpts="";
  for(var n=1;n<=20;n++){
    fromOpts+='<option value="'+n+'"'+(n===state.mulFrom?' selected':'')+'>'+n+'</option>';
    toOpts  +='<option value="'+n+'"'+(n===state.mulTo  ?' selected':'')+'>'+n+'</option>';
  }
  var addSel=hasOp("add")?' selected':'';
  var subSel=hasOp("sub")?' selected':'';
  var mulSel=hasOp("mul")?' selected':'';
  var hasAddSub=hasOp("add")||hasOp("sub");
  
  var html='<div class="setup-card">'
    +'<div class="sec-label">📝 Questions</div>'
    +'<div class="qcount-row">';
  [5,10,15,20].forEach(function(n){
    html+='<div class="qcount-btn'+(state.qCount===n?' selected':'')+'" data-q="'+n+'">'+n+'</div>';
  });
  html+='</div>'
    +'<div class="sec-label">🎯 Pick Operations</div>'
    +'<div class="op-row">'
    +'<div class="op-btn op-add'+addSel+'" id="oA"><span class="op-check">✓</span>'
    +'<div class="op-btn-inner"><div class="op-icon">+</div><span class="op-label">Addition</span></div></div>'
    +'<div class="op-btn op-sub'+subSel+'" id="oS"><span class="op-check">✓</span>'
    +'<div class="op-btn-inner"><div class="op-icon">−</div><span class="op-label">Subtract</span></div></div>'
    +'<div class="op-btn op-mul'+mulSel+'" id="oM"><span class="op-check">✓</span>'
    +'<div class="op-btn-inner"><div class="op-icon">×</div><span class="op-label">Multiply</span></div></div>'
    +'</div>';

  if(hasAddSub){
    html+='<div class="sec-label">➕ / ➖ Addition &amp; Subtraction — Digits</div>'
      +'<div class="digit-row">'+digitBtns+'</div>';
  }
  if(hasMul){
    html+='<div class="sec-label">✖️ Multiplication — Table Range</div>'
      +'<div class="mul-row">'
      +'<select class="styled-sel" id="mF">'+fromOpts+'</select>'
      +'<span class="mul-arrow">to</span>'
      +'<select class="styled-sel" id="mT">'+toOpts+'</select>'
      +'</div>';
  }

  html+='<button class="start-btn" id="sBtn"'+(canStart?'':' disabled')+'>🚀 Let\'s Go!</button>'
    +'</div>';
  el.innerHTML=html;

  el.querySelectorAll(".digit-btn").forEach(function(b){
    b.onclick=function(){toggleDigit(parseInt(b.getAttribute("data-d")));render();};
  });
  var mf=el.querySelector("#mF");
  if(mf)mf.onchange=function(){state.mulFrom=parseInt(mf.value);if(state.mulFrom>state.mulTo)state.mulTo=state.mulFrom;render();};
  var mt=el.querySelector("#mT");
  if(mt)mt.onchange=function(){state.mulTo=parseInt(mt.value);if(state.mulTo<state.mulFrom)state.mulFrom=state.mulTo;render();};
  el.querySelector("#oA").onclick=function(){toggleOp("add");render();};
  el.querySelector("#oS").onclick=function(){toggleOp("sub");render();};
  el.querySelector("#oM").onclick=function(){toggleOp("mul");render();};
  el.querySelectorAll(".qcount-btn").forEach(function(b){
    b.onclick=function(){state.qCount=parseInt(b.getAttribute("data-q"));render();};
  });
  if(canStart){
    el.querySelector("#sBtn").onclick=function(){
      state.bd={add:{c:0,t:0},sub:{c:0,t:0},mul:{c:0,t:0}};
      state.questions=generateQuestions();
      state.cur=0;state.score=0;state.answered=false;
      state.screen="game";render();
    };
  }
}

/* ── GAME ── */
function renderGame(el){
  var q=state.questions[state.cur];
  var total=state.questions.length;
  var pct=(state.cur/total)*100;
  var opName=q.op==="add"?"Addition":q.op==="sub"?"Subtraction":"Multiply";
  var nextLabel=(state.cur<total-1)?"Next Question →":"See Results 🎉";

  var html='<div class="game-card">'
    +'<div class="hud">'
    +'<div class="hud-stat"><span class="hud-val">'+(state.cur+1)+'/'+total+'</span><span class="hud-label">Question</span></div>'
    +'<div class="hud-op-badge '+q.op+'"><span class="badge-sym">'+q.sym+'</span>'+opName+'</div>'
    +'<div class="hud-stat"><span class="hud-val">⭐ '+state.score+'</span><span class="hud-label">Score</span></div>'
    +'</div>'
    +'<div class="progress-track"><div class="progress-fill '+q.op+'" style="width:'+pct+'%"></div></div>'
    +'<div class="question-box '+q.op+'">'
    +'<span class="q-emoji">'+q.emoji+'</span>'
    +'<div class="q-column">'
    +'<span class="q-col-sym spacer">'+q.sym+'</span>'
    +'<span class="q-col-num">'+q.a+'</span>'
    +'<span class="q-col-sym '+q.op+'">'+q.sym+'</span>'
    +'<span class="q-col-num">'+q.b+'</span>'
    +'<div class="q-divider '+q.op+'"></div>'
    +'<span class="q-col-sym spacer">'+q.sym+'</span>'
    +'<span class="q-blank">?</span>'
    +'</div>'
    +'<div class="q-hint">'+q.hint+'</div>'
    +'</div>'
    +'<div class="answer-row">'
    +'<input class="ans-input" id="ansInp" type="number" placeholder="?" autocomplete="off" inputmode="numeric" />'
    +'<button class="check-btn" id="chkBtn">Check ✓</button>'
    +'</div>'
    +'<div class="game-header" style="margin-top:16px; margin-bottom:12px;">'
    +'<button class="icon-btn" id="homeBtn">🏠 Home</button>'
    +'<button class="icon-btn" id="skipBtn">⏭️ Skip</button>'
    +'</div>'
    +'<div class="feedback-bar" id="fb"></div>'
    +'<button class="next-btn" id="nBtn">'+nextLabel+'</button>'
    +'</div>';
  el.innerHTML=html;

  var inp=document.getElementById("ansInp");
  var chk=document.getElementById("chkBtn");
  var homeBtn=document.getElementById("homeBtn");
  var skipBtn=document.getElementById("skipBtn");
  var nBtn=document.getElementById("nBtn");

  function goToNext(){
    if(state.cur<state.questions.length-1){state.cur++;state.answered=false;render();}
    else{state.screen="results";render();}
  }

  homeBtn.onclick=function(){
    if(confirm("Are you sure you want to go to the home menu? Your progress will be lost.")){
      state.screen="setup";render();
    }
  };

  skipBtn.onclick=function(){
    if(!state.answered) {
      goToNext();
    }
  };

  function doCheck(){
    if(state.answered)return;
    var val=inp.value.trim();
    if(val===""||isNaN(Number(val)))return;
    state.answered=true;
    var chosen=Number(val);
    var fb=document.getElementById("fb");
    inp.disabled=true;chk.disabled=true;
    skipBtn.disabled=true;
    if(chosen===q.answer){
      inp.classList.add("correct");
      state.score++;state.bd[q.op].c++;
      var msgs=["Fantastic!","Correct!","Amazing!","You got it!","Superb!"];
      fb.textContent=msgs[ri(0,msgs.length-1)];
      fb.className="feedback-bar good";
    }else{
      inp.classList.add("wrong");
      var bads=["Not quite!","Try next time!","Almost there!"];
      fb.textContent=bads[ri(0,bads.length-1)]+"  Answer: "+q.a+" "+q.sym+" "+q.b+" = "+q.answer;
      fb.className="feedback-bar bad";
    }
    nBtn.classList.add("show");
    skipBtn.style.display="none"; // Hide skip since question is answered, show Next button instead
  }
  chk.onclick=doCheck;
  inp.onkeydown=function(e){if(e.key==="Enter")doCheck();};
  nBtn.onclick=goToNext;
  
  inp.focus();
}

/* ── RESULTS ── */
function renderResults(el){
  var total=state.questions.length;
  var pct=state.score/total;
  if(pct>=0.6)confetti(pct===1?100:60);
  var bkHTML="";
  state.ops.forEach(function(op){
    var bd=state.bd[op];
    var sym=op==="add"?"+":op==="sub"?"−":"×";
    bkHTML+='<div class="breakdown-pill '+op+'-pill">'
      +'<span class="bp-num">'+sym+' '+bd.c+'/'+bd.t+'</span>'
      +'<span class="bp-label">'+(op==="add"?"Addition":op==="sub"?"Subtraction":"Multiply")+'</span>'
      +'</div>';
  });
  el.innerHTML='<div class="results-card">'
    +'<span class="results-medal">'+medalFor(state.score,total)+'</span>'
    +'<div class="results-title">Mission Complete!</div>'
    +'<div class="results-score">'+state.score+'</div>'
    +'<div class="results-denom">out of '+total+' correct</div>'
    +'<div class="results-stars">'+starsEmoji(state.score,total)+'</div>'
    +'<div class="results-msg">'+msgFor(state.score,total)+'</div>'
    +(state.ops.length>1?'<div class="results-breakdown">'+bkHTML+'</div>':'')
    +'<div class="btn-row">'
    +'<button class="retry-btn" id="rBtn">🔄 Play Again</button>'
    +'<button class="menu-btn" id="mBtn">🏠 Menu</button>'
    +'</div></div>';
  document.getElementById("rBtn").onclick=function(){
    state.bd={add:{c:0,t:0},sub:{c:0,t:0},mul:{c:0,t:0}};
    state.questions=generateQuestions();state.cur=0;state.score=0;state.answered=false;
    state.screen="game";render();
  };
  document.getElementById("mBtn").onclick=function(){state.screen="setup";render();};
}

render();
</script>
</body>
</html>
