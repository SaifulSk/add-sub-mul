<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Magic!</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Chewy&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>

/* ── THEMES — dark ── */
body.theme-space        { --bg1:#1a1a2e; --bg2:#16213e; --bg3:#0d2748; --bg4:#0f3460; --accent:#FFD700; --txt:#ffffff; --txt2:rgba(255,255,255,.45); --txt3:rgba(255,255,255,.25); --bdr:rgba(255,255,255,.1); --bdr2:rgba(255,255,255,.18); --star:white; }
body.theme-jungle       { --bg1:#0d1f0d; --bg2:#142814; --bg3:#1a3a1a; --bg4:#1f4a1f; --accent:#7EE87E; --txt:#ffffff; --txt2:rgba(255,255,255,.45); --txt3:rgba(255,255,255,.25); --bdr:rgba(255,255,255,.1); --bdr2:rgba(255,255,255,.18); --star:white; }
body.theme-ocean        { --bg1:#020d1f; --bg2:#04193a; --bg3:#062952; --bg4:#083a6e; --accent:#38d4f5; --txt:#ffffff; --txt2:rgba(255,255,255,.45); --txt3:rgba(255,255,255,.25); --bdr:rgba(255,255,255,.1); --bdr2:rgba(255,255,255,.18); --star:white; }
body.theme-candy        { --bg1:#2a0a2e; --bg2:#3d1042; --bg3:#4f1458; --bg4:#63186e; --accent:#ff80d5; --txt:#ffffff; --txt2:rgba(255,255,255,.45); --txt3:rgba(255,255,255,.25); --bdr:rgba(255,255,255,.1); --bdr2:rgba(255,255,255,.18); --star:white; }
body.theme-fire         { --bg1:#1f0800; --bg2:#321200; --bg3:#451a00; --bg4:#5a2200; --accent:#ff8c00; --txt:#ffffff; --txt2:rgba(255,255,255,.45); --txt3:rgba(255,255,255,.25); --bdr:rgba(255,255,255,.1); --bdr2:rgba(255,255,255,.18); --star:white; }
/* ── THEMES — light ── */
body.theme-space.light  { --bg1:#e8eaf6; --bg2:#ffffff; --bg3:#dde0f5; --bg4:#c5caee; --accent:#5c6bc0; --txt:#1a1a2e; --txt2:rgba(0,0,0,.55); --txt3:rgba(0,0,0,.35); --bdr:rgba(0,0,0,.1); --bdr2:rgba(0,0,0,.15); --star:#5c6bc0; }
body.theme-jungle.light { --bg1:#e8f5e9; --bg2:#ffffff; --bg3:#c8e6c9; --bg4:#a5d6a7; --accent:#2e7d32; --txt:#0d1f0d; --txt2:rgba(0,0,0,.55); --txt3:rgba(0,0,0,.35); --bdr:rgba(0,0,0,.1); --bdr2:rgba(0,0,0,.15); --star:#2e7d32; }
body.theme-ocean.light  { --bg1:#e0f4ff; --bg2:#ffffff; --bg3:#b3e5fc; --bg4:#81d4fa; --accent:#0277bd; --txt:#020d1f; --txt2:rgba(0,0,0,.55); --txt3:rgba(0,0,0,.35); --bdr:rgba(0,0,0,.1); --bdr2:rgba(0,0,0,.15); --star:#0277bd; }
body.theme-candy.light  { --bg1:#fce4ec; --bg2:#ffffff; --bg3:#f8bbd0; --bg4:#f48fb1; --accent:#ad1457; --txt:#2a0a2e; --txt2:rgba(0,0,0,.55); --txt3:rgba(0,0,0,.35); --bdr:rgba(0,0,0,.1); --bdr2:rgba(0,0,0,.15); --star:#ad1457; }
body.theme-fire.light   { --bg1:#fff3e0; --bg2:#ffffff; --bg3:#ffe0b2; --bg4:#ffcc80; --accent:#e65100; --txt:#1f0800; --txt2:rgba(0,0,0,.55); --txt3:rgba(0,0,0,.35); --bdr:rgba(0,0,0,.1); --bdr2:rgba(0,0,0,.15); --star:#e65100; }

:root {
  --add:#FF6B6B; --sub:#3ABEFF; --mul:#A855F7;
  --r:22px; --sh:0 8px 32px rgba(0,0,0,.15);
  --num-font:'Share Tech Mono',monospace;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { min-height:100vh; font-family:'Baloo 2',cursive; background:var(--bg1); overflow-x:hidden; transition:background .35s,color .35s; color:var(--txt); }

/* Stars */
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.star  { position:absolute; background:var(--star,white); border-radius:50%; animation:twinkle ease-in-out infinite alternate; transition:background .35s; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:1;transform:scale(1.3)} }

/* ── LAYOUT ── */
#app { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 14px 70px; }

.game-title {
  font-family:'Chewy',cursive; font-size:clamp(2rem,7vw,3.6rem);
  background:linear-gradient(135deg,var(--accent) 0%,#FF6B6B 40%,#A855F7 80%,#3ABEFF 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  text-align:center; margin-bottom:2px; letter-spacing:2px;
}
.game-sub { color:var(--txt2); text-align:center; font-size:.9rem; font-weight:600; margin-bottom:20px; letter-spacing:1px; }

/* ── THEME SWITCHER ── */
.theme-bar {
  display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; justify-content:center;
}
.theme-dot {
  width:28px; height:28px; border-radius:50%; cursor:pointer;
  border:3px solid transparent; transition:transform .15s, border-color .15s;
  position:relative;
}
.theme-dot:hover { transform:scale(1.18); }
.theme-dot.active { border-color:var(--txt); transform:scale(1.18); }
.theme-dot.td-space  { background:radial-gradient(circle,#6a6ae8,#1a1a2e); }
.theme-dot.td-jungle { background:radial-gradient(circle,#7EE87E,#0d1f0d); }
.theme-dot.td-ocean  { background:radial-gradient(circle,#38d4f5,#020d1f); }
.theme-dot.td-candy  { background:radial-gradient(circle,#ff80d5,#2a0a2e); }
.theme-dot.td-fire   { background:radial-gradient(circle,#ff8c00,#1f0800); }

/* ── CARDS ── */
.setup-card, .game-card, .results-card {
  background:var(--bg2); border:1.5px solid var(--bdr);
  border-radius:var(--r); box-shadow:var(--sh);
  animation:popIn .45s cubic-bezier(.34,1.56,.64,1);
  width:100%; max-width:480px;
}
.setup-card  { padding:22px 18px 26px; }
.game-card   { padding:18px 16px 22px; }
.results-card{ padding:28px 20px 24px; text-align:center; }
@keyframes popIn { from{transform:scale(.78) translateY(28px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }

.sec-label {
  font-family:'Chewy',cursive; font-size:.95rem; color:var(--txt3);
  letter-spacing:2px; text-transform:uppercase; margin-bottom:9px; margin-top:18px;
}
.sec-label:first-child { margin-top:0; }

/* ── DIGIT PICKER ── */
.digit-row { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
.digit-btn {
  background:var(--bg3); border:2px solid var(--bdr); border-radius:12px;
  padding:9px 2px 10px; cursor:pointer; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:5px; transition:all .17s;
}
.digit-btn .d-dots { display:flex; flex-wrap:wrap; justify-content:center; gap:3px; width:28px; min-height:20px; align-items:center; }
.digit-btn .d-dot  { width:5px; height:5px; border-radius:50%; background:var(--bdr2); transition:background .17s; }
.digit-btn .d-label{ font-family:'Chewy',cursive; font-size:.75rem; color:var(--txt3); transition:color .17s; line-height:1; }
.digit-btn .d-range{ font-size:.54rem; color:var(--txt3); transition:color .17s; }
.digit-btn:hover:not(.sel-as) { border-color:var(--bdr2); background:var(--bg4); }
.digit-btn.sel-as {
  border-color:var(--accent);
  background:linear-gradient(160deg,color-mix(in srgb,var(--accent) 20%,transparent),transparent);
  box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 25%,transparent);
}
.digit-btn.sel-as .d-dot  { background:var(--accent); }
.digit-btn.sel-as .d-label{ color:var(--accent); }
.digit-btn.sel-as .d-range{ color:rgba(255,215,0,.45); }

/* ── MUL DROPDOWNS ── */
.mul-row   { display:grid; grid-template-columns:1fr auto 1fr; gap:9px; align-items:center; }
.mul-arrow { color:var(--txt3); font-family:'Chewy',cursive; font-size:1.2rem; text-align:center; }
.mul-hint  { font-size:.68rem; color:var(--txt3); margin-top:5px; text-align:right; }
.styled-sel {
  background:var(--bg3); border:2px solid rgba(168,85,247,.45); border-radius:12px;
  color:var(--txt); font-family:'Baloo 2',cursive; font-size:.95rem; font-weight:700;
  padding:9px 12px; cursor:pointer; appearance:none; -webkit-appearance:none;
  outline:none; width:100%; transition:border-color .2s;
}
.styled-sel:focus { border-color:var(--mul); background-color:var(--bg2); }
.styled-sel option { background:var(--bg2); }
.styled-sel:disabled { opacity:.32; cursor:not-allowed; }

/* ── OP BUTTONS ── */
.op-row { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
.op-btn {
  border-radius:16px; padding:0; cursor:pointer; text-align:center;
  transition:all .15s; border:2.5px solid transparent; background:var(--bg3); overflow:hidden; position:relative;
}
.op-btn-inner { padding:13px 6px 11px; display:flex; flex-direction:column; align-items:center; gap:5px; }
.op-icon { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Chewy',cursive; font-size:1.8rem; transition:transform .2s; }
.op-label { font-family:'Chewy',cursive; font-size:.88rem; color:var(--txt3); transition:color .2s; }
.op-btn:hover:not(.selected) { background:var(--bg4); border-color:var(--bdr2); }
.op-btn:hover .op-icon { transform:scale(1.1); }
.op-btn.op-add.selected { border-color:var(--add); background:linear-gradient(160deg,rgba(255,107,107,.28),rgba(255,107,107,.08)); box-shadow:0 0 0 3px rgba(255,107,107,.22); }
.op-btn.op-sub.selected { border-color:var(--sub); background:linear-gradient(160deg,rgba(58,190,255,.25),rgba(58,190,255,.06)); box-shadow:0 0 0 3px rgba(58,190,255,.2); }
.op-btn.op-mul.selected { border-color:var(--mul); background:linear-gradient(160deg,rgba(168,85,247,.28),rgba(168,85,247,.07)); box-shadow:0 0 0 3px rgba(168,85,247,.22); }
.op-btn.op-add .op-icon { background:rgba(255,107,107,.16); color:var(--add); }
.op-btn.op-sub .op-icon { background:rgba(58,190,255,.14); color:var(--sub); }
.op-btn.op-mul .op-icon { background:rgba(168,85,247,.16); color:var(--mul); }
.op-btn.op-add.selected .op-icon { background:rgba(255,107,107,.32); }
.op-btn.op-sub.selected .op-icon { background:rgba(58,190,255,.28); }
.op-btn.op-mul.selected .op-icon { background:rgba(168,85,247,.32); }
.op-btn.selected .op-label { color:var(--txt); }
.op-btn .op-check { position:absolute; top:6px; right:8px; font-size:.9rem; opacity:0; transition:opacity .2s; }
.op-btn.selected .op-check { opacity:1; }

/* ── Q COUNT ── */
.qcount-row { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
.qcount-btn {
  border:2px solid var(--bdr); border-radius:11px; padding:10px;
  cursor:pointer; text-align:center; font-family:'Chewy',cursive; font-size:1.2rem;
  color:var(--txt); background:var(--bg4); transition:all .18s;
}
.qcount-btn.selected { border-color:var(--accent); background:rgba(255,215,0,.12); color:var(--accent); box-shadow:0 0 0 2px rgba(255,215,0,.18); }
.qcount-btn:hover:not(.selected) { border-color:var(--bdr2); }

/* ── START BTN ── */
.start-btn {
  width:100%; margin-top:20px; padding:14px; border:none; border-radius:16px;
  font-family:'Chewy',cursive; font-size:1.4rem; letter-spacing:2px; cursor:pointer;
  background:linear-gradient(135deg,var(--accent),#FF9B00); color:#1a1a2e;
  box-shadow:0 5px 0 rgba(0,0,0,.35); transition:transform .1s,box-shadow .1s;
}
.start-btn:hover  { transform:translateY(-2px); box-shadow:0 7px 0 rgba(0,0,0,.35); }
.start-btn:active { transform:translateY(3px);  box-shadow:0 2px 0 rgba(0,0,0,.35); }
.start-btn:disabled { opacity:.38; cursor:not-allowed; transform:none; box-shadow:none; }

/* ── HUD ── */
.hud { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.hud-stat { display:flex; flex-direction:column; align-items:center; font-family:'Chewy',cursive; }
.hud-val   { font-size:1.4rem; color:var(--txt); line-height:1; }
.hud-label { font-size:.6rem; color:var(--txt3); letter-spacing:1px; text-transform:uppercase; }
.hud-op-badge {
  font-family:'Chewy',cursive; font-size:1.05rem; letter-spacing:1px;
  padding:6px 14px; border-radius:50px; display:flex; align-items:center; gap:6px;
  color:var(--txt); border:2px solid transparent;
}
.hud-op-badge .badge-sym { font-size:1.35rem; line-height:1; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.hud-op-badge.add { background:rgba(255,107,107,.2); border-color:var(--add); }
.hud-op-badge.add .badge-sym { background:var(--add); }
.hud-op-badge.sub { background:rgba(58,190,255,.16); border-color:var(--sub); }
.hud-op-badge.sub .badge-sym { background:var(--sub); }
.hud-op-badge.mul { background:rgba(168,85,247,.18); border-color:var(--mul); }
.hud-op-badge.mul .badge-sym { background:var(--mul); }

/* ── PROGRESS ── */
.progress-track { background:var(--bdr); border-radius:20px; height:9px; margin-bottom:16px; overflow:hidden; }
.progress-fill  { height:100%; border-radius:20px; transition:width .5s ease; }
.progress-fill.add { background:linear-gradient(90deg,var(--add),#ffb347); }
.progress-fill.sub { background:linear-gradient(90deg,var(--sub),#67e8f9); }
.progress-fill.mul { background:linear-gradient(90deg,var(--mul),#f472b6); }

/* ── QUESTION BOX ── */
.question-box {
  border-radius:18px; padding:20px 18px 16px; margin-bottom:16px;
  border:2px solid transparent; background:var(--bg3);
  display:flex; flex-direction:column; align-items:center;
}
.question-box.add { border-color:rgba(255,107,107,.4); background:rgba(255,107,107,.06); }
.question-box.sub { border-color:rgba(58,190,255,.35); background:rgba(58,190,255,.05); }
.question-box.mul { border-color:rgba(168,85,247,.4); background:rgba(168,85,247,.06); }
.q-emoji { font-size:1.5rem; margin-bottom:10px; display:block; animation:floatY 2.5s ease-in-out infinite alternate; }
@keyframes floatY { from{transform:translateY(0)} to{transform:translateY(-7px)} }

/* ── COLUMN ARITHMETIC — true monospace grid ── */
.q-column {
  display:inline-grid;
  grid-template-columns:auto auto;
  align-items:baseline;
  row-gap:3px;
}
/* operator cell */
.q-col-sym {
  font-family:var(--num-font);
  font-size:clamp(1.7rem,5.5vw,2.4rem);
  line-height:1.1;
  padding-right:8px;
  text-align:right;
}
.q-col-sym.add { color:var(--add); }
.q-col-sym.sub { color:var(--sub); }
.q-col-sym.mul { color:var(--mul); }
.q-col-sym.spacer { visibility:hidden; }
/* number cells — monospace so every digit is identical width */
.q-col-num {
  font-family:var(--num-font);
  font-size:clamp(2rem,7vw,2.8rem);
  color:var(--txt); line-height:1.1;
  text-align:right;
  text-shadow:0 2px 8px rgba(0,0,0,.2);
  /* Force a wide-enough cell so short numbers don't shift alignment */
  min-width:4.5ch;
  display:block;
}
/* divider spans both columns */
.q-divider {
  grid-column:1/-1;
  height:3px; border-radius:2px; margin:5px 0;
}
.q-divider.add { background:linear-gradient(90deg,transparent,var(--add),transparent); }
.q-divider.sub { background:linear-gradient(90deg,transparent,var(--sub),transparent); }
.q-divider.mul { background:linear-gradient(90deg,transparent,var(--mul),transparent); }
/* blank answer slot — same metrics as .q-col-num */
.q-blank {
  font-family:var(--num-font);
  font-size:clamp(2rem,7vw,2.8rem);
  color:var(--txt3);
  text-align:right;
  min-width:4.5ch;
  display:block;
  border-bottom:3px dashed var(--bdr2);
  padding-bottom:2px;
}
.q-hint { font-size:.74rem; color:var(--txt3); margin-top:10px; font-style:italic; text-align:center; }

/* ── ANSWER INPUT ── */
.answer-row { display:flex; gap:9px; align-items:center; margin-bottom:12px; }
.ans-input {
  flex:1; background:var(--bg3); border:2px solid var(--bdr2);
  border-radius:14px; color:var(--txt); font-family:var(--num-font);
  font-size:clamp(1.6rem,5.5vw,2rem); padding:11px 14px;
  outline:none; text-align:center; transition:border-color .2s,background .2s;
  -moz-appearance:textfield;
}
.ans-input::-webkit-outer-spin-button,.ans-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
.ans-input:focus   { border-color:var(--txt2); background:rgba(128,128,128,.12); }
.ans-input.correct { border-color:#4ade80; background:rgba(74,222,128,.16); animation:cBounce .5s ease; box-shadow:0 0 16px rgba(74,222,128,.32); }
.ans-input.wrong   { border-color:#f87171; background:rgba(248,113,113,.16); animation:wShake .45s ease; }
.check-btn {
  padding:12px 18px; border:none; border-radius:14px; font-family:'Chewy',cursive;
  font-size:1.15rem; cursor:pointer;
  background:linear-gradient(135deg,var(--accent),#FF9B00); color:#1a1a2e;
  box-shadow:0 4px 0 rgba(0,0,0,.3); transition:transform .12s,box-shadow .12s;
  white-space:nowrap;
}
.check-btn:hover   { transform:translateY(-2px); box-shadow:0 6px 0 rgba(0,0,0,.3); }
.check-btn:active  { transform:translateY(2px);  box-shadow:0 2px 0 rgba(0,0,0,.3); }
.check-btn:disabled{ opacity:.38; cursor:not-allowed; transform:none; }

@keyframes cBounce { 0%{transform:scale(1)}35%{transform:scale(1.06)}65%{transform:scale(.97)}100%{transform:scale(1)} }
@keyframes wShake  { 0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)} }

/* ── FEEDBACK & NEXT ── */
.feedback-bar { min-height:1.9rem; text-align:center; font-family:'Chewy',cursive; font-size:1.1rem; margin-bottom:8px; animation:fadeUp .3s ease; color:var(--txt); }
@keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:none} }
.feedback-bar.good { color:#4ade80; }
.feedback-bar.bad  { color:#f87171; }
.next-btn {
  width:100%; padding:12px; border:none; border-radius:14px;
  font-family:'Chewy',cursive; font-size:1.2rem; letter-spacing:1px; cursor:pointer;
  transition:transform .12s,box-shadow .12s,opacity .2s; opacity:0; pointer-events:none;
  background:linear-gradient(135deg,#4ade80,#22c55e); color:#14532d; box-shadow:0 5px 0 #166534;
}
.next-btn.show   { opacity:1; pointer-events:all; }
.next-btn:hover  { transform:translateY(-2px); box-shadow:0 7px 0 #166534; }
.next-btn:active { transform:translateY(3px);  box-shadow:0 2px 0 #166534; }

/* ── RESULTS ── */
.results-medal  { font-size:4.5rem; display:block; margin-bottom:8px; animation:mBounce 1s ease-in-out infinite alternate; }
@keyframes mBounce { from{transform:translateY(0) scale(1)} to{transform:translateY(-12px) scale(1.07)} }
.results-title  { font-family:'Chewy',cursive; font-size:1.9rem; color:var(--txt); margin-bottom:5px; }
.results-score  { font-family:'Chewy',cursive; font-size:4rem; background:linear-gradient(135deg,var(--accent),#FF9B00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; }
.results-denom  { font-size:.85rem; color:var(--txt3); margin-bottom:12px; font-weight:700; }
.results-stars  { font-size:2.2rem; letter-spacing:5px; margin-bottom:8px; }
.results-msg    { color:var(--txt2); font-size:.95rem; font-weight:700; margin-bottom:20px; line-height:1.5; }
.results-breakdown { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:20px; }
.breakdown-pill { border-radius:12px; padding:9px 5px; text-align:center; font-family:'Chewy',cursive; }
.breakdown-pill .bp-num   { font-size:1.35rem; display:block; }
.breakdown-pill .bp-label { font-size:.62rem; text-transform:uppercase; letter-spacing:1px; opacity:.62; }
.breakdown-pill.add-pill { background:rgba(255,107,107,.16); color:var(--add); }
.breakdown-pill.sub-pill { background:rgba(58,190,255,.13);  color:var(--sub); }
.breakdown-pill.mul-pill { background:rgba(168,85,247,.16); color:var(--mul); }
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.retry-btn,.menu-btn { padding:13px; border:none; border-radius:14px; font-family:'Chewy',cursive; font-size:1.1rem; cursor:pointer; transition:transform .1s; }
.retry-btn { background:linear-gradient(135deg,#A855F7,#7C3AED); color:white; box-shadow:0 4px 0 #5b21b6; }
.retry-btn:hover  { transform:translateY(-2px); }
.retry-btn:active { transform:translateY(3px); box-shadow:0 1px 0 #5b21b6; }
.menu-btn { background:var(--bg3); color:var(--txt2); border:1.5px solid var(--bdr); }
.menu-btn:hover { background:var(--bg4); transform:translateY(-2px); }

/* ── CONFETTI ── */
.confetti-piece { position:fixed; width:9px; height:13px; border-radius:3px; opacity:0; pointer-events:none; z-index:99; animation:cfFall linear forwards; }
@keyframes cfFall { 0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(900deg)} }

/* ── RESPONSIVE ── */
@media(max-width:480px){
  #app { padding:14px 10px 56px; }
  .game-title { font-size:clamp(1.7rem,8vw,2.4rem); }
  .game-sub { font-size:.8rem; margin-bottom:14px; }
  .theme-dot { width:24px; height:24px; }
  .setup-card,.game-card,.results-card { border-radius:16px; }
  .setup-card { padding:16px 12px 20px; }
  .game-card  { padding:14px 12px 18px; }
  .sec-label  { font-size:.8rem; margin-top:14px; }
  .digit-btn  { padding:7px 2px 8px; border-radius:9px; }
  .digit-btn .d-dot { width:4px; height:4px; }
  .digit-btn .d-label { font-size:.68rem; }
  .digit-btn .d-range { display:none; }
  .op-icon  { width:42px; height:42px; font-size:1.55rem; }
  .op-label { font-size:.8rem; }
  .op-btn-inner { padding:11px 5px 9px; }
  .qcount-btn { font-size:1.05rem; padding:9px; }
  .styled-sel { font-size:.88rem; padding:8px 10px; }
  .start-btn  { font-size:1.25rem; padding:12px; }
  .hud-val    { font-size:1.2rem; }
  .hud-op-badge { font-size:.9rem; padding:5px 11px; }
  .hud-op-badge .badge-sym { width:26px; height:26px; font-size:1.1rem; }
  .q-col-num  { font-size:clamp(1.7rem,7vw,2.4rem); min-width:4ch; }
  .q-blank    { font-size:clamp(1.7rem,7vw,2.4rem); min-width:4ch; }
  .q-col-sym  { font-size:clamp(1.4rem,5vw,2rem); padding-right:6px; }
  .answer-row { flex-direction:column; gap:7px; }
  .ans-input  { width:100%; font-size:clamp(1.4rem,5.5vw,1.8rem); padding:10px 12px; }
  .check-btn  { width:100%; font-size:1.05rem; padding:11px; }
  .feedback-bar { font-size:.95rem; }
  .next-btn   { font-size:1.05rem; padding:10px; }
  .results-medal { font-size:3.5rem; }
  .results-title { font-size:1.6rem; }
  .results-score { font-size:3.2rem; }
  .results-stars { font-size:1.9rem; }
  .results-msg   { font-size:.88rem; }
  .retry-btn,.menu-btn { font-size:.98rem; padding:11px; }
}
@media(max-width:340px){
  .digit-row { gap:4px; }
  .q-col-num  { font-size:clamp(1.4rem,6.5vw,2rem); min-width:3.5ch; }
  .q-blank    { font-size:clamp(1.4rem,6.5vw,2rem); min-width:3.5ch; }
}


/* ── DARK / LIGHT TOGGLE ── */
.mode-toggle {
  width:36px; height:36px; border-radius:50%; border:2.5px solid var(--bdr2);
  background:var(--bg3); color:var(--txt); font-size:1.1rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:transform .15s, border-color .15s, background .3s;
  line-height:1; padding:0;
}
.mode-toggle:hover { transform:scale(1.18); border-color:var(--accent); }
</style>
</head>
<body class="theme-space">
<div class="stars" id="stars"></div>
<div id="app">
  <div class="game-title">&#10024; Math Magic!</div>
  <div class="game-sub">&#128640; The Adventure Math Game</div>
  <div class="theme-bar" id="themeBar">
    <div class="theme-dot td-space  active" data-theme="space"  title="Space"></div>
    <div class="theme-dot td-jungle"        data-theme="jungle" title="Jungle"></div>
    <div class="theme-dot td-ocean"         data-theme="ocean"  title="Ocean"></div>
    <div class="theme-dot td-candy"         data-theme="candy"  title="Candy"></div>
    <div class="theme-dot td-fire"          data-theme="fire"   title="Fire"></div>
    <button class="mode-toggle" id="modeToggle" title="Toggle dark/light">&#9790;</button>
  </div>
  <div id="screen"></div>
</div>
<script>

/* starfield */
(function(){
  var s=document.getElementById("stars");
  for(var i=0;i<80;i++){
    var el=document.createElement("div");el.className="star";
    var sz=Math.random()*2.5+.8;
    el.style.cssText="width:"+sz+"px;height:"+sz+"px;left:"+(Math.random()*100)+"%;"
      +"top:"+(Math.random()*100)+"%;animation-duration:"+(1.5+Math.random()*3)+"s;"
      +"animation-delay:"+(Math.random()*3)+"s;";
    s.appendChild(el);
  }
})();

/* theme + mode switcher */
var _isLight=false;
function applyTheme(name){
  document.body.className="theme-"+name+(_isLight?" light":"");
}
document.getElementById("themeBar").onclick=function(e){
  var dot=e.target.closest(".theme-dot");
  if(dot){
    document.querySelectorAll(".theme-dot").forEach(function(d){d.classList.remove("active");});
    dot.classList.add("active");
    applyTheme(dot.getAttribute("data-theme"));
    return;
  }
  if(e.target.id==="modeToggle"||e.target.closest("#modeToggle")){
    _isLight=!_isLight;
    var active=document.querySelector(".theme-dot.active");
    applyTheme(active?active.getAttribute("data-theme"):"space");
    document.getElementById("modeToggle").innerHTML=_isLight?"&#9788;":"&#9790;";
  }
};

var DIGIT_CONFIG=[
  {d:1,lo:1,    hi:9,    label:"1-Digit",range:"1-9"},
  {d:2,lo:10,   hi:99,   label:"2-Digit",range:"10-99"},
  {d:3,lo:100,  hi:999,  label:"3-Digit",range:"100-999"},
  {d:4,lo:1000, hi:9999, label:"4-Digit",range:"1K-9K"},
  {d:5,lo:10000,hi:99999,label:"5-Digit",range:"10K-99K"}
];

var state={
  screen:"setup",
  asDigits:[1],mulFrom:1,mulTo:12,
  ops:[],qCount:10,
  questions:[],cur:0,score:0,answered:false,
  bd:{add:{c:0,t:0},sub:{c:0,t:0},mul:{c:0,t:0}}
};

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){return a.slice().sort(function(){return Math.random()-.5;});}
function hasOp(op){return state.ops.indexOf(op)>=0;}
function toggleOp(op){var i=state.ops.indexOf(op);if(i>=0)state.ops.splice(i,1);else state.ops.push(op);}
function hasDigit(d){return state.asDigits.indexOf(d)>=0;}
function toggleDigit(d){var i=state.asDigits.indexOf(d);if(i>=0)state.asDigits.splice(i,1);else state.asDigits.push(d);}

function randFromDigits(){
  var pool=state.asDigits;
  var d=pool[ri(0,pool.length-1)];
  var cfg=null;
  for(var i=0;i<DIGIT_CONFIG.length;i++){if(DIGIT_CONFIG[i].d===d){cfg=DIGIT_CONFIG[i];break;}}
  return ri(cfg.lo,cfg.hi);
}

function makeWrongs(answer,count){
  var mag=Math.max(1,Math.abs(answer));
  var spread=Math.max(2,Math.round(mag*0.15));
  var arr=[];var tries=0;
  while(arr.length<count&&tries<3000){
    tries++;
    var delta;var r=Math.random();
    if(r<0.4)delta=ri(1,spread);
    else if(r<0.7)delta=-ri(1,spread);
    else delta=ri(spread+1,spread*3)*(Math.random()<0.5?1:-1);
    var w=answer+delta;
    var dup=false;
    for(var i=0;i<arr.length;i++){if(arr[i]===w){dup=true;break;}}
    if(w>0&&w!==answer&&!dup)arr.push(w);
  }
  var fb=1;
  while(arr.length<count){
    var dup2=false;
    for(var i=0;i<arr.length;i++){if(arr[i]===fb){dup2=true;break;}}
    if(fb!==answer&&!dup2)arr.push(fb);
    fb++;
  }
  return arr.slice(0,count);
}

var HINTS={
  add:["Combine them together!","Add them all up!","Count them all!"],
  sub:["Take some away!","How many are left?","Remove and count!"],
  mul:["Equal groups!","Repeated adding!","Count in groups!"]
};
var EMOJIS={
  add:["\uD83C\uDF4E","\uD83C\uDF88","\u2B50","\uD83C\uDF38","\uD83E\uDD8B","\uD83C\uDF55","\uD83D\uDC36","\uD83C\uDF08","\uD83C\uDF81","\uD83E\uDD84"],
  sub:["\uD83C\uDF4A","\uD83C\uDF80","\uD83C\uDF19","\uD83D\uDC1F","\uD83C\uDF66","\uD83C\uDFA0","\uD83D\uDC31","\uD83C\uDF39","\uD83D\uDE82","\uD83E\uDD8A"],
  mul:["\uD83C\uDF1F","\uD83C\uDFB8","\uD83D\uDC2C","\uD83E\uDD80","\uD83C\uDFC0","\uD83C\uDF44","\uD83C\uDFA1","\uD83E\uDD81","\uD83C\uDF0A","\uD83C\uDFAF"]
};

function genQ(op){
  var a,b,answer;
  if(op==="add"){a=randFromDigits();b=randFromDigits();answer=a+b;}
  else if(op==="sub"){a=randFromDigits();b=randFromDigits();if(b>a){var t=a;a=b;b=t;}answer=a-b;}
  else{a=ri(state.mulFrom,state.mulTo);b=ri(state.mulFrom,state.mulTo);answer=a*b;}
  var em=EMOJIS[op];
  var sym=(op==="add")?"+":((op==="sub")?"\u2212":"\u00D7");
  return{op:op,a:a,b:b,answer:answer,sym:sym,
    hint:HINTS[op][ri(0,HINTS[op].length-1)],
    emoji:em[ri(0,em.length-1)]};
}

function generateQuestions(){
  var ops=state.ops;
  var perOp=Math.ceil(state.qCount/ops.length);
  var qs=[];
  for(var i=0;i<ops.length;i++){
    var op=ops[i];state.bd[op].t=perOp;
    for(var j=0;j<perOp;j++)qs.push(genQ(op));
  }
  return shuffle(qs).slice(0,state.qCount);
}

function starsEmoji(s,t){var p=s/t;return p===1?"\u2B50\u2B50\u2B50":p>=0.7?"\u2B50\u2B50":"\u2B50";}
function medalFor(s,t){var p=s/t;return p===1?"\uD83C\uDFC6":p>=0.7?"\uD83E\uDD48":p>=0.4?"\uD83E\uDD49":"\uD83C\uDF97\uFE0F";}
function msgFor(s,t){
  var p=s/t;
  if(p===1)return"Perfect! You're a Math Wizard! \uD83E\uDDD9";
  if(p>=0.8)return"Outstanding work, Superstar! \uD83C\uDF1F";
  if(p>=0.6)return"Great effort! Keep it up! \uD83D\uDCAA";
  if(p>=0.4)return"Good try! Practice makes perfect! \uD83D\uDCDA";
  return"Don't give up! Every try makes you stronger! \uD83C\uDF08";
}

function confetti(count){
  var cols=["#FFD700","#FF6B6B","#3ABEFF","#A855F7","#4ade80","#f472b6","#FB923C"];
  for(var i=0;i<count;i++){
    var el=document.createElement("div");el.className="confetti-piece";
    el.style.left=ri(5,95)+"vw";
    el.style.background=cols[ri(0,cols.length-1)];
    el.style.animationDuration=(1.8+Math.random()*2.2)+"s";
    el.style.animationDelay=(Math.random()*1.6)+"s";
    document.body.appendChild(el);
    (function(e){setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e);},5000);})(el);
  }
}

function render(){
  var sc=document.getElementById("screen");
  if(state.screen==="setup")renderSetup(sc);
  else if(state.screen==="game")renderGame(sc);
  else renderResults(sc);
}

/* ── SETUP ── */
function renderSetup(el){
  var canStart=state.ops.length>0&&((hasOp("add")||hasOp("sub"))?state.asDigits.length>0:true);
  var hasMul=hasOp("mul");
  var digitBtns="";
  for(var i=0;i<DIGIT_CONFIG.length;i++){
    var cfg=DIGIT_CONFIG[i];
    var dots="";for(var k=0;k<cfg.d;k++)dots+='<span class="d-dot"></span>';
    var sel=hasDigit(cfg.d)?' sel-as':'';
    digitBtns+='<div class="digit-btn'+sel+'" data-d="'+cfg.d+'"><div class="d-dots">'+dots+'</div>'
      +'<span class="d-label">'+cfg.label+'</span><span class="d-range">'+cfg.range+'</span></div>';
  }
  var fromOpts="",toOpts="";
  for(var n=1;n<=20;n++){
    fromOpts+='<option value="'+n+'"'+(n===state.mulFrom?' selected':'')+'>'+n+'</option>';
    toOpts  +='<option value="'+n+'"'+(n===state.mulTo  ?' selected':'')+'>'+n+'</option>';
  }
  var dis=hasMul?'':'disabled';
  var addSel=hasOp("add")?' selected':'';
  var subSel=hasOp("sub")?' selected':'';
  var mulSel=hasOp("mul")?' selected':'';
  var html='<div class="setup-card">'
    +'<div class="sec-label">&#xFF0B; / &#x2212; Addition &amp; Subtraction &#8212; Digits</div>'
    +'<div class="digit-row">'+digitBtns+'</div>'
    +'<div class="sec-label">&#x00D7; Multiplication &#8212; Table Range</div>'
    +'<div class="mul-row">'
    +'<select class="styled-sel" id="mF" '+dis+'>'+fromOpts+'</select>'
    +'<span class="mul-arrow">to</span>'
    +'<select class="styled-sel" id="mT" '+dis+'>'+toOpts+'</select>'
    +'</div>'
    +'<p class="mul-hint">Select Multiply below to enable</p>'
    +'<div class="sec-label">&#127919; Pick Operations</div>'
    +'<div class="op-row">'
    +'<div class="op-btn op-add'+addSel+'" id="oA"><span class="op-check">&#10003;</span>'
    +'<div class="op-btn-inner"><div class="op-icon">+</div><span class="op-label">Addition</span></div></div>'
    +'<div class="op-btn op-sub'+subSel+'" id="oS"><span class="op-check">&#10003;</span>'
    +'<div class="op-btn-inner"><div class="op-icon">&#x2212;</div><span class="op-label">Subtract</span></div></div>'
    +'<div class="op-btn op-mul'+mulSel+'" id="oM"><span class="op-check">&#10003;</span>'
    +'<div class="op-btn-inner"><div class="op-icon">&#x00D7;</div><span class="op-label">Multiply</span></div></div>'
    +'</div>'
    +'<div class="sec-label">&#128203; Questions</div>'
    +'<div class="qcount-row">';
  [5,10,15,20].forEach(function(n){
    html+='<div class="qcount-btn'+(state.qCount===n?' selected':'')+'" data-q="'+n+'">'+n+'</div>';
  });
  html+='</div>'
    +'<button class="start-btn" id="sBtn"'+(canStart?'':' disabled')+'>&#128640; Launch!</button>'
    +'</div>';
  el.innerHTML=html;

  el.querySelectorAll(".digit-btn").forEach(function(b){
    b.onclick=function(){toggleDigit(parseInt(b.getAttribute("data-d")));render();};
  });
  var mf=el.querySelector("#mF");
  if(mf)mf.onchange=function(){state.mulFrom=parseInt(mf.value);if(state.mulFrom>state.mulTo)state.mulTo=state.mulFrom;render();};
  var mt=el.querySelector("#mT");
  if(mt)mt.onchange=function(){state.mulTo=parseInt(mt.value);if(state.mulTo<state.mulFrom)state.mulFrom=state.mulTo;render();};
  el.querySelector("#oA").onclick=function(){toggleOp("add");render();};
  el.querySelector("#oS").onclick=function(){toggleOp("sub");render();};
  el.querySelector("#oM").onclick=function(){toggleOp("mul");render();};
  el.querySelectorAll(".qcount-btn").forEach(function(b){
    b.onclick=function(){state.qCount=parseInt(b.getAttribute("data-q"));render();};
  });
  if(canStart){
    el.querySelector("#sBtn").onclick=function(){
      state.bd={add:{c:0,t:0},sub:{c:0,t:0},mul:{c:0,t:0}};
      state.questions=generateQuestions();
      state.cur=0;state.score=0;state.answered=false;
      state.screen="game";render();
    };
  }
}

/* ── GAME ── */
function renderGame(el){
  var q=state.questions[state.cur];
  var total=state.questions.length;
  var pct=(state.cur/total)*100;
  var opName=q.op==="add"?"Addition":q.op==="sub"?"Subtraction":"Multiply";
  var nextLabel=(state.cur<total-1)?"Next Question &#8594;":"See Results &#127881;";

  var html='<div class="game-card">'
    +'<div class="hud">'
    +'<div class="hud-stat"><span class="hud-val">'+(state.cur+1)+'/'+total+'</span><span class="hud-label">Question</span></div>'
    +'<div class="hud-op-badge '+q.op+'"><span class="badge-sym">'+q.sym+'</span>'+opName+'</div>'
    +'<div class="hud-stat"><span class="hud-val">&#11088; '+state.score+'</span><span class="hud-label">Score</span></div>'
    +'</div>'
    +'<div class="progress-track"><div class="progress-fill '+q.op+'" style="width:'+pct+'%"></div></div>'
    +'<div class="question-box '+q.op+'">'
    +'<span class="q-emoji">'+q.emoji+'</span>'
    +'<div class="q-column">'
    /* row 1: hidden sym + first number */
    +'<span class="q-col-sym spacer">'+q.sym+'</span>'
    +'<span class="q-col-num">'+q.a+'</span>'
    /* row 2: operator + second number */
    +'<span class="q-col-sym '+q.op+'">'+q.sym+'</span>'
    +'<span class="q-col-num">'+q.b+'</span>'
    /* divider */
    +'<div class="q-divider '+q.op+'"></div>'
    /* row 3: hidden sym + blank */
    +'<span class="q-col-sym spacer">'+q.sym+'</span>'
    +'<span class="q-blank">?</span>'
    +'</div>'
    +'<div class="q-hint">'+q.hint+'</div>'
    +'</div>'
    +'<div class="answer-row">'
    +'<input class="ans-input" id="ansInp" type="number" placeholder="?" autocomplete="off" inputmode="numeric" />'
    +'<button class="check-btn" id="chkBtn">Check &#10003;</button>'
    +'</div>'
    +'<div class="feedback-bar" id="fb"></div>'
    +'<button class="next-btn" id="nBtn">'+nextLabel+'</button>'
    +'</div>';
  el.innerHTML=html;

  var inp=document.getElementById("ansInp");
  var chk=document.getElementById("chkBtn");
  function doCheck(){
    if(state.answered)return;
    var val=inp.value.trim();
    if(val===""||isNaN(Number(val)))return;
    state.answered=true;
    var chosen=Number(val);
    var fb=document.getElementById("fb");
    var nBtn=document.getElementById("nBtn");
    inp.disabled=true;chk.disabled=true;
    if(chosen===q.answer){
      inp.classList.add("correct");
      state.score++;state.bd[q.op].c++;
      var msgs=["Fantastic!","Correct!","Amazing!","You got it!","Superb!"];
      fb.textContent=msgs[ri(0,msgs.length-1)];
      fb.className="feedback-bar good";
    }else{
      inp.classList.add("wrong");
      var bads=["Not quite!","Try next time!","Almost there!"];
      fb.textContent=bads[ri(0,bads.length-1)]+"  Answer: "+q.a+" "+q.sym+" "+q.b+" = "+q.answer;
      fb.className="feedback-bar bad";
    }
    nBtn.classList.add("show");
  }
  chk.onclick=doCheck;
  inp.onkeydown=function(e){if(e.key==="Enter")doCheck();};
  document.getElementById("nBtn").onclick=function(){
    if(state.cur<state.questions.length-1){state.cur++;state.answered=false;render();}
    else{state.screen="results";render();}
  };
}

/* ── RESULTS ── */
function renderResults(el){
  var total=state.questions.length;
  var pct=state.score/total;
  if(pct>=0.6)confetti(pct===1?100:60);
  var bkHTML="";
  state.ops.forEach(function(op){
    var bd=state.bd[op];
    var sym=op==="add"?"+":op==="sub"?"\u2212":"\u00D7";
    bkHTML+='<div class="breakdown-pill '+op+'-pill">'
      +'<span class="bp-num">'+sym+' '+bd.c+'/'+bd.t+'</span>'
      +'<span class="bp-label">'+(op==="add"?"Addition":op==="sub"?"Subtraction":"Multiply")+'</span>'
      +'</div>';
  });
  el.innerHTML='<div class="results-card">'
    +'<span class="results-medal">'+medalFor(state.score,total)+'</span>'
    +'<div class="results-title">Mission Complete!</div>'
    +'<div class="results-score">'+state.score+'</div>'
    +'<div class="results-denom">out of '+total+' correct</div>'
    +'<div class="results-stars">'+starsEmoji(state.score,total)+'</div>'
    +'<div class="results-msg">'+msgFor(state.score,total)+'</div>'
    +(state.ops.length>1?'<div class="results-breakdown">'+bkHTML+'</div>':'')
    +'<div class="btn-row">'
    +'<button class="retry-btn" id="rBtn">&#128260; Play Again</button>'
    +'<button class="menu-btn" id="mBtn">&#127968; Menu</button>'
    +'</div></div>';
  document.getElementById("rBtn").onclick=function(){
    state.bd={add:{c:0,t:0},sub:{c:0,t:0},mul:{c:0,t:0}};
    state.questions=generateQuestions();state.cur=0;state.score=0;state.answered=false;
    state.screen="game";render();
  };
  document.getElementById("mBtn").onclick=function(){state.screen="setup";render();};
}

render();

</script>
</body>
</html>
