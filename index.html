<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Magic!</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Chewy&display=swap" rel="stylesheet">
<style>
:root{--add:#FF6B6B;--sub:#3ABEFF;--mul:#A855F7;--gold:#FFD700;--r:26px;--sh:0 10px 40px rgba(0,0,0,.18);}
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;font-family:"Baloo 2",cursive;background:#1a1a2e;overflow-x:hidden;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.1;transform:scale(.8)}to{opacity:1;transform:scale(1.3)}}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 80px;}
.game-title{font-family:"Chewy",cursive;font-size:clamp(2.4rem,8vw,4rem);background:linear-gradient(135deg,#FFD700 0%,#FF6B6B 40%,#A855F7 80%,#3ABEFF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px;letter-spacing:2px;filter:drop-shadow(0 2px 8px rgba(255,215,0,.3));}
.game-sub{color:rgba(255,255,255,.5);text-align:center;font-size:1rem;font-weight:600;margin-bottom:28px;letter-spacing:1px;}
.setup-card{background:#16213e;border:2px solid rgba(255,255,255,.1);border-radius:var(--r);padding:28px 24px 32px;max-width:500px;width:100%;box-shadow:var(--sh);animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.75) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.sec-label{font-family:"Chewy",cursive;font-size:1.05rem;color:rgba(255,255,255,.42);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;margin-top:20px;}
.sec-label:first-child{margin-top:0;}
.digit-row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
.digit-btn{background:#0d2748;border:2.5px solid rgba(255,255,255,.12);border-radius:14px;padding:10px 3px 11px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .18s;}
.digit-btn .d-dots{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;width:30px;min-height:22px;align-items:center;}
.digit-btn .d-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .18s;}
.digit-btn .d-label{font-family:"Chewy",cursive;font-size:.8rem;color:rgba(255,255,255,.38);transition:color .18s;line-height:1;}
.digit-btn .d-range{font-size:.58rem;color:rgba(255,255,255,.2);transition:color .18s;}
.digit-btn:hover:not(.sel-as){border-color:rgba(255,255,255,.28);background:#122d55;}
.digit-btn.sel-as{border-color:var(--gold);background:linear-gradient(160deg,rgba(255,215,0,.18),rgba(255,215,0,.04));box-shadow:0 0 0 3px rgba(255,215,0,.2);}
.digit-btn.sel-as .d-dot{background:var(--gold);}
.digit-btn.sel-as .d-label{color:var(--gold);}
.digit-btn.sel-as .d-range{color:rgba(255,215,0,.5);}
.mul-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;}
.mul-arrow{color:rgba(255,255,255,.3);font-family:"Chewy",cursive;font-size:1.3rem;text-align:center;}
.mul-hint{font-size:.72rem;color:rgba(255,255,255,.25);margin-top:6px;text-align:right;}
.styled-sel{background:#0d2748;border:2.5px solid rgba(168,85,247,.5);border-radius:13px;color:white;font-family:"Baloo 2",cursive;font-size:1rem;font-weight:700;padding:10px 14px;cursor:pointer;appearance:none;-webkit-appearance:none;outline:none;width:100%;transition:border-color .2s;}
.styled-sel:focus{border-color:var(--mul);background-color:#16213e;}
.styled-sel option{background:#16213e;}
.styled-sel:disabled{opacity:.35;cursor:not-allowed;}
.op-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.op-btn{border-radius:18px;padding:0;cursor:pointer;text-align:center;transition:all .15s;border:3px solid transparent;background:#0d2748;overflow:hidden;position:relative;}
.op-btn-inner{padding:14px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:5px;}
.op-icon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Chewy",cursive;font-size:1.9rem;transition:transform .2s;}
.op-label{font-family:"Chewy",cursive;font-size:.95rem;color:rgba(255,255,255,.45);transition:color .2s;}
.op-btn:hover:not(.selected){background:#122d55;border-color:rgba(255,255,255,.2);}
.op-btn:hover .op-icon{transform:scale(1.1);}
.op-btn.op-add.selected{border-color:var(--add);background:linear-gradient(160deg,rgba(255,107,107,.28),rgba(255,107,107,.08));box-shadow:0 0 0 4px rgba(255,107,107,.25);}
.op-btn.op-sub.selected{border-color:var(--sub);background:linear-gradient(160deg,rgba(58,190,255,.25),rgba(58,190,255,.06));box-shadow:0 0 0 4px rgba(58,190,255,.22);}
.op-btn.op-mul.selected{border-color:var(--mul);background:linear-gradient(160deg,rgba(168,85,247,.28),rgba(168,85,247,.07));box-shadow:0 0 0 4px rgba(168,85,247,.25);}
.op-btn.op-add .op-icon{background:rgba(255,107,107,.18);color:var(--add);}
.op-btn.op-sub .op-icon{background:rgba(58,190,255,.15);color:var(--sub);}
.op-btn.op-mul .op-icon{background:rgba(168,85,247,.18);color:var(--mul);}
.op-btn.op-add.selected .op-icon{background:rgba(255,107,107,.35);}
.op-btn.op-sub.selected .op-icon{background:rgba(58,190,255,.3);}
.op-btn.op-mul.selected .op-icon{background:rgba(168,85,247,.35);}
.op-btn.selected .op-label{color:white;}
.op-btn .op-check{position:absolute;top:7px;right:9px;font-size:1rem;opacity:0;transition:opacity .2s;}
.op-btn.selected .op-check{opacity:1;}
.qcount-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.qcount-btn{border:2px solid rgba(255,255,255,.12);border-radius:12px;padding:11px;cursor:pointer;text-align:center;font-family:"Chewy",cursive;font-size:1.3rem;color:white;background:#0f3460;transition:all .2s;}
.qcount-btn.selected{border-color:var(--gold);background:rgba(255,215,0,.15);box-shadow:0 0 0 3px rgba(255,215,0,.2);color:var(--gold);}
.qcount-btn:hover:not(.selected){border-color:rgba(255,255,255,.3);}
.start-btn{width:100%;margin-top:24px;padding:15px;border:none;border-radius:18px;font-family:"Chewy",cursive;font-size:1.5rem;letter-spacing:2px;cursor:pointer;background:linear-gradient(135deg,#FFD700,#FF9B00);color:#1a1a2e;box-shadow:0 6px 0 #b8800a;transition:transform .1s,box-shadow .1s;}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 0 #b8800a;}
.start-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #b8800a;}
.start-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.game-card{background:#16213e;border:2px solid rgba(255,255,255,.1);border-radius:var(--r);padding:22px 20px 26px;max-width:500px;width:100%;box-shadow:var(--sh);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
.hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.hud-stat{display:flex;flex-direction:column;align-items:center;font-family:"Chewy",cursive;}
.hud-val{font-size:1.5rem;color:white;line-height:1;}
.hud-label{font-size:.65rem;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase;}
.hud-op-badge{font-family:"Chewy",cursive;font-size:1.15rem;letter-spacing:1px;padding:7px 16px;border-radius:50px;display:flex;align-items:center;gap:7px;color:white;border:2.5px solid transparent;}
.hud-op-badge .badge-sym{font-size:1.5rem;line-height:1;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.hud-op-badge.add{background:rgba(255,107,107,.22);border-color:var(--add);}
.hud-op-badge.add .badge-sym{background:var(--add);}
.hud-op-badge.sub{background:rgba(58,190,255,.18);border-color:var(--sub);}
.hud-op-badge.sub .badge-sym{background:var(--sub);}
.hud-op-badge.mul{background:rgba(168,85,247,.2);border-color:var(--mul);}
.hud-op-badge.mul .badge-sym{background:var(--mul);}
.progress-track{background:rgba(255,255,255,.08);border-radius:20px;height:10px;margin-bottom:20px;overflow:hidden;}
.progress-fill{height:100%;border-radius:20px;transition:width .5s ease;}
.progress-fill.add{background:linear-gradient(90deg,var(--add),#ffb347);}
.progress-fill.sub{background:linear-gradient(90deg,var(--sub),#67e8f9);}
.progress-fill.mul{background:linear-gradient(90deg,var(--mul),#f472b6);}
.question-box{border-radius:22px;padding:22px 20px 18px;margin-bottom:18px;border:2.5px solid transparent;background:rgba(255,255,255,.04);display:flex;flex-direction:column;align-items:center;}
.question-box.add{border-color:rgba(255,107,107,.45);background:rgba(255,107,107,.07);}
.question-box.sub{border-color:rgba(58,190,255,.4);background:rgba(58,190,255,.06);}
.question-box.mul{border-color:rgba(168,85,247,.45);background:rgba(168,85,247,.07);}
.q-emoji{font-size:1.6rem;margin-bottom:12px;display:block;animation:floatY 2.5s ease-in-out infinite alternate;}
@keyframes floatY{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.q-column{display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:150px;}
.q-col-row{display:flex;align-items:center;gap:14px;width:100%;}
.q-col-sym{font-family:"Chewy",cursive;font-size:clamp(1.8rem,6vw,2.5rem);min-width:32px;text-align:center;line-height:1;}
.q-col-sym.add{color:var(--add);}
.q-col-sym.sub{color:var(--sub);}
.q-col-sym.mul{color:var(--mul);}
.q-col-num{font-family:"Chewy",cursive;font-size:clamp(2.2rem,7.5vw,3rem);color:white;line-height:1;text-align:right;flex:1;text-shadow:0 3px 10px rgba(0,0,0,.3);}
.q-divider{width:100%;height:3px;border-radius:2px;margin:6px 0;}
.q-divider.add{background:linear-gradient(90deg,transparent,var(--add),transparent);}
.q-divider.sub{background:linear-gradient(90deg,transparent,var(--sub),transparent);}
.q-divider.mul{background:linear-gradient(90deg,transparent,var(--mul),transparent);}
.q-blank{font-family:"Chewy",cursive;font-size:clamp(2.2rem,7.5vw,3rem);color:rgba(255,255,255,.2);text-align:right;flex:1;border-bottom:3px dashed rgba(255,255,255,.2);padding-bottom:2px;}
.q-hint{font-size:.78rem;color:rgba(255,255,255,.27);margin-top:12px;font-style:italic;text-align:center;}
.answer-row{display:flex;gap:10px;align-items:center;margin-bottom:14px;}
.ans-input{flex:1;background:rgba(255,255,255,.07);border:2.5px solid rgba(255,255,255,.18);border-radius:16px;color:white;font-family:"Chewy",cursive;font-size:clamp(1.8rem,6vw,2.4rem);padding:12px 18px;outline:none;text-align:center;transition:border-color .2s,background .2s;-moz-appearance:textfield;}
.ans-input::-webkit-outer-spin-button,.ans-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.ans-input:focus{border-color:rgba(255,255,255,.45);background:rgba(255,255,255,.11);}
.ans-input.correct{border-color:#4ade80;background:rgba(74,222,128,.18);animation:cBounce .5s ease;box-shadow:0 0 20px rgba(74,222,128,.35);}
.ans-input.wrong{border-color:#f87171;background:rgba(248,113,113,.18);animation:wShake .45s ease;}
.check-btn{padding:14px 22px;border:none;border-radius:16px;font-family:"Chewy",cursive;font-size:1.25rem;cursor:pointer;background:linear-gradient(135deg,#FFD700,#FF9B00);color:#1a1a2e;box-shadow:0 5px 0 #b8800a;transition:transform .12s,box-shadow .12s,opacity .2s;white-space:nowrap;}
.check-btn:hover{transform:translateY(-2px);box-shadow:0 7px 0 #b8800a;}
.check-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #b8800a;}
.check-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
@keyframes cBounce{0%{transform:scale(1)}35%{transform:scale(1.06)}65%{transform:scale(.97)}100%{transform:scale(1)}}
@keyframes wShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.feedback-bar{min-height:2rem;text-align:center;font-family:"Chewy",cursive;font-size:1.2rem;margin-bottom:8px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.feedback-bar.good{color:#4ade80;}
.feedback-bar.bad{color:#f87171;}
.next-btn{width:100%;padding:13px;border:none;border-radius:16px;font-family:"Chewy",cursive;font-size:1.3rem;letter-spacing:1px;cursor:pointer;transition:transform .12s,box-shadow .12s,opacity .2s;opacity:0;pointer-events:none;background:linear-gradient(135deg,#4ade80,#22c55e);color:#14532d;box-shadow:0 5px 0 #166534;}
.next-btn.show{opacity:1;pointer-events:all;}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 7px 0 #166534;}
.next-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #166534;}
.results-card{background:#16213e;border:2px solid rgba(255,255,255,.1);border-radius:var(--r);padding:34px 26px 30px;max-width:480px;width:100%;text-align:center;box-shadow:var(--sh);animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
.results-medal{font-size:5rem;display:block;margin-bottom:10px;animation:mBounce 1s ease-in-out infinite alternate;}
@keyframes mBounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-14px) scale(1.08)}}
.results-title{font-family:"Chewy",cursive;font-size:2.1rem;color:white;margin-bottom:6px;}
.results-score{font-family:"Chewy",cursive;font-size:4.5rem;background:linear-gradient(135deg,#FFD700,#FF9B00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.results-denom{font-size:.9rem;color:rgba(255,255,255,.38);margin-bottom:14px;font-weight:700;}
.results-stars{font-size:2.6rem;letter-spacing:6px;margin-bottom:10px;}
.results-msg{color:rgba(255,255,255,.6);font-size:1rem;font-weight:700;margin-bottom:24px;line-height:1.5;}
.results-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px;}
.breakdown-pill{border-radius:14px;padding:10px 6px;text-align:center;font-family:"Chewy",cursive;}
.breakdown-pill .bp-num{font-size:1.5rem;display:block;}
.breakdown-pill .bp-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;opacity:.65;}
.breakdown-pill.add-pill{background:rgba(255,107,107,.18);color:var(--add);}
.breakdown-pill.sub-pill{background:rgba(58,190,255,.14);color:var(--sub);}
.breakdown-pill.mul-pill{background:rgba(168,85,247,.18);color:var(--mul);}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.retry-btn,.menu-btn{padding:14px;border:none;border-radius:16px;font-family:"Chewy",cursive;font-size:1.2rem;cursor:pointer;transition:transform .1s;}
.retry-btn{background:linear-gradient(135deg,#A855F7,#7C3AED);color:white;box-shadow:0 5px 0 #5b21b6;}
.retry-btn:hover{transform:translateY(-2px);}
.retry-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #5b21b6;}
.menu-btn{background:rgba(255,255,255,.09);color:rgba(255,255,255,.75);border:2px solid rgba(255,255,255,.14);}
.menu-btn:hover{background:rgba(255,255,255,.15);transform:translateY(-2px);}
.confetti-piece{position:fixed;width:10px;height:14px;border-radius:3px;opacity:0;pointer-events:none;z-index:99;animation:cfFall linear forwards;}
@keyframes cfFall{0%{opacity:1;transform:translateY(-20px) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(100vh) rotate(900deg) scale(.5)}}

/* ── RESPONSIVE ── */
@media(max-width:520px){
  #app{padding:16px 10px 60px;}
  .game-title{font-size:clamp(1.8rem,9vw,2.8rem);}
  .game-sub{font-size:.85rem;margin-bottom:18px;}

  /* Setup card */
  .setup-card{padding:20px 14px 24px;border-radius:18px;}
  .sec-label{font-size:.85rem;letter-spacing:1px;margin-top:16px;}

  /* Digit row — keep 5 cols but smaller */
  .digit-btn{padding:8px 2px 9px;border-radius:10px;gap:4px;}
  .digit-btn .d-dots{width:24px;min-height:18px;}
  .digit-btn .d-dot{width:5px;height:5px;}
  .digit-btn .d-label{font-size:.7rem;}
  .digit-btn .d-range{font-size:.52rem;}

  /* Op buttons */
  .op-icon{width:42px;height:42px;font-size:1.5rem;}
  .op-label{font-size:.8rem;}
  .op-btn-inner{padding:12px 6px 10px;}

  /* Q count */
  .qcount-btn{font-size:1.1rem;padding:9px;}

  /* Dropdowns */
  .styled-sel{font-size:.9rem;padding:9px 12px;}

  /* Game card */
  .game-card{padding:16px 14px 20px;border-radius:18px;}
  .hud-val{font-size:1.25rem;}
  .hud-op-badge{font-size:.95rem;padding:6px 12px;}
  .hud-op-badge .badge-sym{width:26px;height:26px;font-size:1.2rem;}

  /* Question column */
  .q-col-sym{font-size:clamp(1.5rem,6vw,2rem);min-width:26px;}
  .q-col-num{font-size:clamp(1.9rem,8vw,2.6rem);}
  .q-blank{font-size:clamp(1.9rem,8vw,2.6rem);}
  .q-column{min-width:120px;}
  .question-box{padding:16px 14px 14px;}

  /* Answer row */
  .answer-row{flex-direction:column;gap:8px;}
  .ans-input{width:100%;font-size:clamp(1.6rem,6vw,2rem);padding:10px 14px;}
  .check-btn{width:100%;font-size:1.15rem;padding:12px;}

  /* Feedback */
  .feedback-bar{font-size:1rem;}
  .next-btn{font-size:1.1rem;padding:11px;}

  /* Results */
  .results-card{padding:24px 16px 22px;border-radius:18px;}
  .results-medal{font-size:3.8rem;}
  .results-title{font-size:1.7rem;}
  .results-score{font-size:3.5rem;}
  .results-stars{font-size:2rem;}
  .results-msg{font-size:.9rem;}
  .breakdown-pill .bp-num{font-size:1.2rem;}
  .retry-btn,.menu-btn{font-size:1rem;padding:11px;}
}

@media(max-width:360px){
  .digit-row{gap:4px;}
  .digit-btn .d-label{font-size:.62rem;}
  .digit-btn .d-range{display:none;}
  .op-icon{width:36px;height:36px;font-size:1.3rem;}
  .q-col-num{font-size:clamp(1.6rem,7vw,2.2rem);}
  .q-blank{font-size:clamp(1.6rem,7vw,2.2rem);}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div id="app">
  <div class="game-title">&#10024; Math Magic!</div>
  <div class="game-sub">&#128640; The Adventure Math Game</div>
  <div id="screen"></div>
</div>
<script>

(function(){
  var s=document.getElementById("stars");
  for(var i=0;i<90;i++){
    var el=document.createElement("div"); el.className="star";
    var sz=Math.random()*3+1;
    el.style.cssText="width:"+sz+"px;height:"+sz+"px;left:"+(Math.random()*100)+"%;"
      +"top:"+(Math.random()*100)+"%;animation-duration:"+(1.5+Math.random()*3)+"s;"
      +"animation-delay:"+(Math.random()*3)+"s;";
    s.appendChild(el);
  }
})();

var DIGIT_CONFIG=[
  {d:1,lo:1,    hi:9,    label:"1-Digit",range:"1-9"},
  {d:2,lo:10,   hi:99,   label:"2-Digit",range:"10-99"},
  {d:3,lo:100,  hi:999,  label:"3-Digit",range:"100-999"},
  {d:4,lo:1000, hi:9999, label:"4-Digit",range:"1K-9K"},
  {d:5,lo:10000,hi:99999,label:"5-Digit",range:"10K-99K"}
];

var state={
  screen:"setup",
  asDigits:[1],
  mulFrom:1,mulTo:12,
  ops:[],qCount:10,
  questions:[],cur:0,score:0,answered:false,
  bd:{add:{c:0,t:0},sub:{c:0,t:0},mul:{c:0,t:0}}
};

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){return a.slice().sort(function(){return Math.random()-.5;});}
function hasOp(op){return state.ops.indexOf(op)>=0;}
function toggleOp(op){var i=state.ops.indexOf(op);if(i>=0)state.ops.splice(i,1);else state.ops.push(op);}
function hasDigit(d){return state.asDigits.indexOf(d)>=0;}
function toggleDigit(d){var i=state.asDigits.indexOf(d);if(i>=0)state.asDigits.splice(i,1);else state.asDigits.push(d);}

function randFromDigits(){
  var pool=state.asDigits;
  var d=pool[ri(0,pool.length-1)];
  var cfg=null;
  for(var i=0;i<DIGIT_CONFIG.length;i++){if(DIGIT_CONFIG[i].d===d){cfg=DIGIT_CONFIG[i];break;}}
  return ri(cfg.lo,cfg.hi);
}

function makeWrongs(answer,count){
  var mag=Math.max(1,Math.abs(answer));
  var spread=Math.max(2,Math.round(mag*0.15));
  var arr=[];
  var tries=0;
  while(arr.length<count&&tries<3000){
    tries++;
    var delta;
    var r=Math.random();
    if(r<0.4)delta=ri(1,spread);
    else if(r<0.7)delta=-ri(1,spread);
    else delta=ri(spread+1,spread*3)*(Math.random()<0.5?1:-1);
    var w=answer+delta;
    var dup=false;
    for(var i=0;i<arr.length;i++){if(arr[i]===w){dup=true;break;}}
    if(w>0&&w!==answer&&!dup)arr.push(w);
  }
  var fb=1;
  while(arr.length<count){
    var dup2=false;
    for(var i=0;i<arr.length;i++){if(arr[i]===fb){dup2=true;break;}}
    if(fb!==answer&&!dup2)arr.push(fb);
    fb++;
  }
  return arr.slice(0,count);
}

var HINTS={
  add:["Combine them together!","Add them all up!","Count them all!"],
  sub:["Take some away!","How many are left?","Remove and count!"],
  mul:["Equal groups!","Repeated adding!","Count in groups!"]
};
var EMOJIS={
  add:["\uD83C\uDF4E","\uD83C\uDF88","\u2B50","\uD83C\uDF38","\uD83E\uDD8B","\uD83C\uDF55","\uD83D\uDC36","\uD83C\uDF08","\uD83C\uDF81","\uD83E\uDD84"],
  sub:["\uD83C\uDF4A","\uD83C\uDF80","\uD83C\uDF19","\uD83D\uDC1F","\uD83C\uDF66","\uD83C\uDFA0","\uD83D\uDC31","\uD83C\uDF39","\uD83D\uDE82","\uD83E\uDD8A"],
  mul:["\uD83C\uDF1F","\uD83C\uDFB8","\uD83D\uDC2C","\uD83E\uDD80","\uD83C\uDFC0","\uD83C\uDF44","\uD83C\uDFA1","\uD83E\uDD81","\uD83C\uDF0A","\uD83C\uDFAF"]
};

function genQ(op){
  var a,b,answer;
  if(op==="add"){a=randFromDigits();b=randFromDigits();answer=a+b;}
  else if(op==="sub"){a=randFromDigits();b=randFromDigits();if(b>a){var tmp=a;a=b;b=tmp;}answer=a-b;}
  else{a=ri(state.mulFrom,state.mulTo);b=ri(state.mulFrom,state.mulTo);answer=a*b;}
  var w=makeWrongs(answer,3);
  var em=EMOJIS[op];
  var sym=(op==="add")?"+":((op==="sub")?"\u2212":"\u00D7");
  return{op:op,a:a,b:b,answer:answer,sym:sym,
    options:shuffle([answer,w[0],w[1],w[2]]),
    hint:HINTS[op][ri(0,HINTS[op].length-1)],
    emoji:em[ri(0,em.length-1)]};
}

function generateQuestions(){
  var ops=state.ops;
  var perOp=Math.ceil(state.qCount/ops.length);
  var qs=[];
  for(var i=0;i<ops.length;i++){
    var op=ops[i];state.bd[op].t=perOp;
    for(var j=0;j<perOp;j++)qs.push(genQ(op));
  }
  return shuffle(qs).slice(0,state.qCount);
}

function starsEmoji(s,t){var p=s/t;return p===1?"\u2B50\u2B50\u2B50":p>=0.7?"\u2B50\u2B50":"\u2B50";}
function medalFor(s,t){var p=s/t;return p===1?"\uD83C\uDFC6":p>=0.7?"\uD83E\uDD48":p>=0.4?"\uD83E\uDD49":"\uD83C\uDF97\uFE0F";}
function msgFor(s,t){
  var p=s/t;
  if(p===1)return"Perfect! You're a Math Wizard! \uD83E\uDDD9";
  if(p>=0.8)return"Outstanding work, Superstar! \uD83C\uDF1F";
  if(p>=0.6)return"Great effort! Keep it up! \uD83D\uDCAA";
  if(p>=0.4)return"Good try! Practice makes perfect! \uD83D\uDCDA";
  return"Don't give up! Every try makes you stronger! \uD83C\uDF08";
}

function confetti(count){
  var cols=["#FFD700","#FF6B6B","#3ABEFF","#A855F7","#4ade80","#f472b6","#FB923C"];
  for(var i=0;i<count;i++){
    var el=document.createElement("div");el.className="confetti-piece";
    el.style.left=ri(5,95)+"vw";
    el.style.background=cols[ri(0,cols.length-1)];
    el.style.animationDuration=(1.8+Math.random()*2.2)+"s";
    el.style.animationDelay=(Math.random()*1.6)+"s";
    document.body.appendChild(el);
    (function(e){setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e);},5000);})(el);
  }
}

function render(){
  var sc=document.getElementById("screen");
  if(state.screen==="setup")renderSetup(sc);
  else if(state.screen==="game")renderGame(sc);
  else renderResults(sc);
}

function renderSetup(el){
  var canStart=state.ops.length>0&&((hasOp("add")||hasOp("sub"))?state.asDigits.length>0:true);
  var hasMul=hasOp("mul");
  var digitBtns="";
  for(var i=0;i<DIGIT_CONFIG.length;i++){
    var cfg=DIGIT_CONFIG[i];
    var dots="";for(var k=0;k<cfg.d;k++)dots+='<span class="d-dot"></span>';
    var sel=hasDigit(cfg.d)?' sel-as':'';
    digitBtns+='<div class="digit-btn'+sel+'" data-d="'+cfg.d+'"><div class="d-dots">'+dots+'</div>'
      +'<span class="d-label">'+cfg.label+'</span><span class="d-range">'+cfg.range+'</span></div>';
  }
  var fromOpts="",toOpts="";
  for(var n=1;n<=20;n++){
    fromOpts+='<option value="'+n+'"'+(n===state.mulFrom?' selected':'')+'>'+n+'</option>';
    toOpts  +='<option value="'+n+'"'+(n===state.mulTo  ?' selected':'')+'>'+n+'</option>';
  }
  var dis=hasMul?'':'disabled';
  var addSel=hasOp("add")?' selected':'';
  var subSel=hasOp("sub")?' selected':'';
  var mulSel=hasOp("mul")?' selected':'';
  var html='<div class="setup-card">'
    +'<div class="sec-label">&#xFF0B;&#xFF0F;&#x2212; Addition &amp; Subtraction &#8212; Digits</div>'
    +'<div class="digit-row">'+digitBtns+'</div>'
    +'<div class="sec-label">&#215; Multiplication &#8212; Table Range</div>'
    +'<div class="mul-row">'
    +'<select class="styled-sel" id="mF" '+dis+'>'+fromOpts+'</select>'
    +'<span class="mul-arrow">to</span>'
    +'<select class="styled-sel" id="mT" '+dis+'>'+toOpts+'</select>'
    +'</div>'
    +'<p class="mul-hint">Select Multiply below to enable</p>'
    +'<div class="sec-label">&#127919; Pick Operations</div>'
    +'<div class="op-row">'
    +'<div class="op-btn op-add'+addSel+'" id="oA"><span class="op-check">&#10003;</span>'
    +'<div class="op-btn-inner"><div class="op-icon">+</div><span class="op-label">Addition</span></div></div>'
    +'<div class="op-btn op-sub'+subSel+'" id="oS"><span class="op-check">&#10003;</span>'
    +'<div class="op-btn-inner"><div class="op-icon">&#x2212;</div><span class="op-label">Subtract</span></div></div>'
    +'<div class="op-btn op-mul'+mulSel+'" id="oM"><span class="op-check">&#10003;</span>'
    +'<div class="op-btn-inner"><div class="op-icon">&#x00D7;</div><span class="op-label">Multiply</span></div></div>'
    +'</div>'
    +'<div class="sec-label">&#128203; Questions</div>'
    +'<div class="qcount-row">';
  [5,10,15,20].forEach(function(n){
    html+='<div class="qcount-btn'+(state.qCount===n?' selected':'')+'" data-q="'+n+'">'+n+'</div>';
  });
  html+='</div>'
    +'<button class="start-btn" id="sBtn"'+(canStart?'':' disabled')+'>&#128640; Launch!</button>'
    +'</div>';
  el.innerHTML=html;

  el.querySelectorAll(".digit-btn").forEach(function(b){
    b.onclick=function(){toggleDigit(parseInt(b.getAttribute("data-d")));render();};
  });
  var mf=el.querySelector("#mF");
  if(mf)mf.onchange=function(){state.mulFrom=parseInt(mf.value);if(state.mulFrom>state.mulTo)state.mulTo=state.mulFrom;render();};
  var mt=el.querySelector("#mT");
  if(mt)mt.onchange=function(){state.mulTo=parseInt(mt.value);if(state.mulTo<state.mulFrom)state.mulFrom=state.mulTo;render();};
  el.querySelector("#oA").onclick=function(){toggleOp("add");render();};
  el.querySelector("#oS").onclick=function(){toggleOp("sub");render();};
  el.querySelector("#oM").onclick=function(){toggleOp("mul");render();};
  el.querySelectorAll(".qcount-btn").forEach(function(b){
    b.onclick=function(){state.qCount=parseInt(b.getAttribute("data-q"));render();};
  });
  if(canStart){
    el.querySelector("#sBtn").onclick=function(){
      state.bd={add:{c:0,t:0},sub:{c:0,t:0},mul:{c:0,t:0}};
      state.questions=generateQuestions();
      state.cur=0;state.score=0;state.answered=false;
      state.screen="game";render();
    };
  }
}

function renderGame(el){
  var q=state.questions[state.cur];
  var total=state.questions.length;
  var pct=(state.cur/total)*100;
  var opName=q.op==="add"?"Addition":q.op==="sub"?"Subtraction":"Multiply";
  var nextLabel=(state.cur<total-1)?"Next Question &#8594;":"See Results &#127881;";
  var html='<div class="game-card">'
    +'<div class="hud">'
    +'<div class="hud-stat"><span class="hud-val">'+(state.cur+1)+'/'+total+'</span><span class="hud-label">Question</span></div>'
    +'<div class="hud-op-badge '+q.op+'"><span class="badge-sym">'+q.sym+'</span>'+opName+'</div>'
    +'<div class="hud-stat"><span class="hud-val">&#11088; '+state.score+'</span><span class="hud-label">Score</span></div>'
    +'</div>'
    +'<div class="progress-track"><div class="progress-fill '+q.op+'" style="width:'+pct+'%"></div></div>'
    +'<div class="question-box '+q.op+'">'
    +'<span class="q-emoji">'+q.emoji+'</span>'
    +'<div class="q-column">'
    +'<div class="q-col-row" style="justify-content:flex-end">'
    +'<span class="q-col-sym" style="visibility:hidden">'+q.sym+'</span>'
    +'<span class="q-col-num">'+q.a+'</span>'
    +'</div>'
    +'<div class="q-col-row">'
    +'<span class="q-col-sym '+q.op+'">'+q.sym+'</span>'
    +'<span class="q-col-num">'+q.b+'</span>'
    +'</div>'
    +'<div class="q-divider '+q.op+'"></div>'
    +'<div class="q-col-row" style="justify-content:flex-end">'
    +'<span class="q-col-sym" style="visibility:hidden">'+q.sym+'</span>'
    +'<span class="q-blank">?</span>'
    +'</div>'
    +'</div>'
    +'<div class="q-hint">'+q.hint+'</div>'
    +'</div>'
    +'<div class="answer-row">'
    +'<input class="ans-input" id="ansInp" type="number" placeholder="?" autocomplete="off" />'
    +'<button class="check-btn" id="chkBtn">Check &#10003;</button>'
    +'</div>'
    +'<div class="feedback-bar" id="fb"></div>'
    +'<button class="next-btn" id="nBtn">'+nextLabel+'</button>'
    +'</div>';
  el.innerHTML=html;

  var inp=document.getElementById("ansInp");
  var chk=document.getElementById("chkBtn");
  function doCheck(){
    if(state.answered)return;
    var val=inp.value.trim();
    if(val===""||isNaN(Number(val)))return;
    state.answered=true;
    var chosen=Number(val);
    var fb=document.getElementById("fb");
    var nBtn=document.getElementById("nBtn");
    inp.disabled=true; chk.disabled=true;
    if(chosen===q.answer){
      inp.classList.add("correct");
      state.score++;state.bd[q.op].c++;
      var msgs=["Fantastic!","Correct!","Amazing!","You got it!","Superb!"];
      fb.textContent=msgs[ri(0,msgs.length-1)];
      fb.className="feedback-bar good";
    }else{
      inp.classList.add("wrong");
      var bads=["Not quite!","Try next time!","Almost there!"];
      fb.textContent=bads[ri(0,bads.length-1)]+"  Answer: "+q.a+" "+q.sym+" "+q.b+" = "+q.answer;
      fb.className="feedback-bar bad";
    }
    nBtn.classList.add("show");
  }
  chk.onclick=doCheck;
  inp.onkeydown=function(e){if(e.key==="Enter")doCheck();};
  document.getElementById("nBtn").onclick=function(){
    if(state.cur<state.questions.length-1){state.cur++;state.answered=false;render();}
    else{state.screen="results";render();}
  };
}

function renderResults(el){
  var total=state.questions.length;
  var pct=state.score/total;
  if(pct>=0.6)confetti(pct===1?100:65);
  var bkHTML="";
  state.ops.forEach(function(op){
    var bd=state.bd[op];
    var sym=op==="add"?"+":op==="sub"?"\u2212":"\u00D7";
    bkHTML+='<div class="breakdown-pill '+op+'-pill">'
      +'<span class="bp-num">'+sym+' '+bd.c+'/'+bd.t+'</span>'
      +'<span class="bp-label">'+(op==="add"?"Addition":op==="sub"?"Subtraction":"Multiply")+'</span>'
      +'</div>';
  });
  el.innerHTML='<div class="results-card">'
    +'<span class="results-medal">'+medalFor(state.score,total)+'</span>'
    +'<div class="results-title">Mission Complete!</div>'
    +'<div class="results-score">'+state.score+'</div>'
    +'<div class="results-denom">out of '+total+' correct</div>'
    +'<div class="results-stars">'+starsEmoji(state.score,total)+'</div>'
    +'<div class="results-msg">'+msgFor(state.score,total)+'</div>'
    +(state.ops.length>1?'<div class="results-breakdown">'+bkHTML+'</div>':'')
    +'<div class="btn-row">'
    +'<button class="retry-btn" id="rBtn">&#128260; Play Again</button>'
    +'<button class="menu-btn" id="mBtn">&#127968; Menu</button>'
    +'</div></div>';
  document.getElementById("rBtn").onclick=function(){
    state.bd={add:{c:0,t:0},sub:{c:0,t:0},mul:{c:0,t:0}};
    state.questions=generateQuestions();state.cur=0;state.score=0;state.answered=false;
    state.screen="game";render();
  };
  document.getElementById("mBtn").onclick=function(){state.screen="setup";render();};
}

render();

</script>

</html>
